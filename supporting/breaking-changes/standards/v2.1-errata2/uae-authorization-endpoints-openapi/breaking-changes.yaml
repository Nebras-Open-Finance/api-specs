# Accepted breaking changes introduced in this version of the spec.
#
# Each entry is matched against oasdiff's ERR-level output. An entry is
# considered matching if its `rule` (or any of its `rules`) matches AND any
# of its `endpoints` matches the (method, path) of the change. Matched
# changes are filtered out before the test asserts.
#
# Format:
#   - rule: <oasdiff rule code>   # or `rules: [a, b, c]` for multiple
#     endpoints:
#       - method: GET
#         path: /some/path/{Param}
#     signedOffBy: Name - Role, Org
#     rationale: |
#       Free text written from the perspective of the change author,
#       explaining what changed, why, and the impact on consumers.

- rules:
    - response-body-one-of-added
    - response-body-type-changed
    - response-required-property-removed
  endpoints:
    - method: POST
      path: /token
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change aligns the specification with the actual behaviour of the
    API Hub implementation. No functional change is being made to the API.

    In v2.1, POST /token defined a single flat response body as type: object
    with required properties access_token, authorization_details, expires_in,
    and token_type. However, the live API Hub returns different response
    shapes depending on which OAuth 2.0 grant type was used: the
    authorization_code, refresh_token, and client_credentials grants each
    carry slightly different semantics and payload contents, and the flat
    object modelled in v2.1 did not capture this.

    This discrepancy between the spec and the production implementation has
    caused confusion for consumers integrating against v2.1 literally, since
    the actual response shape does not match the documented contract.

    In v2.1-errata1, this is corrected by modelling the response as a oneOf
    across three grant-type-specific schemas:
    AEAuthorizationCodeGrantTokenResponseProperties,
    AERefreshTokenGrantTokenResponseProperties, and
    AEClientCredentialsGrantTokenResponseProperties. The previously required
    top-level properties are now owned by the relevant grant-specific
    subschemas rather than the outer response body.

    This is a documentation-level change only. No behavioural change is
    being introduced; consumers that have integrated against the actual API
    Hub behaviour remain unaffected. The errata simply brings the
    specification into line with the response shapes that consumers
    already observe in production.

- rule: request-property-enum-value-removed
  endpoints:
    - method: POST
      path: /par
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change aligns the `CreditorIndicators.AccountType` enum inside the
    Bank Service Initiation Rich Authorization Request (RAR) Risk object
    with the equivalent field in the Payments spec and with the api-hub's
    `AEAccountTypeCode` schema, all of which describe the same logical
    attribute.

    In v2.1, `AEBankServiceInitiationRichAuthorizationRequests.AECreditorIndicators.AccountType`
    declared `[CurrentAccount, Savings, CreditCard, Mortgage, Finance]`
    inline — a product/account-category enum. The equivalent field in
    `uae-bank-initiation-openapi.yaml` (where the TPP sends the same
    Risk object in POST /payments) referenced `AEAccountTypeCode`, which
    declared `[Retail, Corporate]` — a customer-segment enum. A TPP
    therefore could not send the same `Risk.CreditorIndicators.AccountType`
    value in PAR and in POST /payments and stay schema-valid in both.

    In v2.1-errata2, both sides converge on `[Retail, SME, Corporate]`,
    matching the api-hub `AEAccountTypeCode` which already carried that
    value set (with `SME` added in api-hub v2.1.7). The old product-category
    values are removed; consumers should use the customer-segment values
    going forward.

    A parity test under `supporting/tests/standards/` now enforces that
    every field of the Risk object is schema-equivalent between the PAR
    and Payments specs, so this class of divergence cannot recur silently.

- rule: request-property-min-length-increased
  endpoints:
    - method: POST
      path: /par
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    `AddressLine.items` on the PAR side now carries `minLength: 1`, matching
    the constraint already present on the Payments side. This affects the
    `AddressLine` arrays under the Creditor `PostalAddress`, the
    CreditorAgent `PostalAddress`, and `Risk.DestinationDeliveryAddress`
    `NationalAddress`, in both the Domestic and International Payment PII
    variants.

    This is the converse direction of the alignment already recorded under
    `uae-bank-initiation-openapi/` (rationale there): Payments has long
    enforced `minLength: 1` / `maxLength: 70` on address lines, while the PAR
    side left `minLength` unset (effectively 0). v2.1-errata2 brings PAR into
    line so a TPP can send the same address to PAR and to POST /payments and
    stay schema-valid in both. The `maxLength: 70` additions on the same
    properties are reported by oasdiff only as warnings and are not listed
    here.

    Impact: a TPP that sent an empty-string address line to POST /par will
    now receive a validation error; the remedy is to omit the empty line.

- rule: request-property-type-changed
  endpoints:
    - method: POST
      path: /par
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    The international Creditor party
    (`PersonalIdentifiableInformation.Initiation.Creditor[*].Creditor` in the
    International Payment PII variant) changes from a single flat `object` to
    a `oneOf` of an Individual and an Organization variant, discriminated by
    `IdentityType`, as part of the SWIFT SR2026 alignment. oasdiff reports the
    restructure as a type change on the `Creditor` property.

    This adds the structured beneficiary attributes required for cross-border
    payments (name parts, `RelationshipToSender`, `DateOfBirth`, `Nationality`,
    `SourceOfFunds`/`SourceOfIncome`, identity `Evidence`, organisation
    identifiers such as `AnyBIC`/`LEI`, and an object-valued `Name`). The
    equivalent restructure is applied to the Payments, Consent Manager and
    Ozone Connect specs. Domestic Creditor schemas are unchanged.

    Impact: a TPP populating the international Creditor must now send either a
    valid Individual or Organization object and set `IdentityType`
    accordingly. The previously valid flat Creditor object (carrying only
    `Name` and `PostalAddress`) maps onto the new variants, which retain those
    properties.

- rules:
    - request-property-became-required
    - request-property-max-length-decreased
  endpoints:
    - method: POST
      path: /par
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    The international Creditor Agent's `PostalAddress`
    (`PersonalIdentifiableInformation.Initiation.Creditor[*].CreditorAgent.PostalAddress`
    in the International Payment PII variant) is aligned onto the same address
    schema as the international Creditor itself, as part of the SWIFT SR2026
    work. Both now reference a single shared `AEInternationalAddress` (renamed
    from `AEInternationalCreditorAddress`); the Creditor Agent previously
    referenced the legacy `AEAddress`.

    Relative to `AEAddress`, the shared `AEInternationalAddress` makes
    `TownName` required and tightens its `maxLength` from 140 to 70 (the ISO
    20022 `PostalAddress27` `Max70Text` bound). oasdiff reports these as
    `request-property-became-required` and
    `request-property-max-length-decreased` on the Creditor Agent `TownName`.

    Rationale: ISO 20022 models both a party address (`Cdtr`) and a financial
    institution address (`CdtrAgt/FinInstnId`) with the same `PostalAddress27`
    type, so a single shared schema is the more standards-faithful design and
    removes the divergence between the two international address shapes. The
    agent `PostalAddress` itself remains optional (only `SchemeName` and
    `Identification` are required on the Creditor Agent), so a BIC-only agent
    is unaffected.

    Impact: a TPP that supplies an international Creditor Agent address must
    now include `TownName` and keep it within 70 characters. The equivalent
    change is recorded under `uae-bank-initiation-openapi/` for POST /payments.
