# Accepted breaking changes introduced in this version of the spec.
#
# Each entry is matched against oasdiff's ERR-level output. An entry is
# considered matching if its `rule` matches AND any of its `endpoints` matches
# the (method, path) of the change. Matched changes are filtered out before
# the test asserts.
#
# Format:
#   - rule: <oasdiff rule code>   # or `rules: [a, b, c]` for multiple
#     endpoints:
#       - method: GET
#         path: /some/path/{Param}
#     signedOffBy: Name - Role, Org
#     rationale: |
#       Free text written from the perspective of the change author,
#       explaining what changed, why, and the impact on consumers.

- rule: response-property-enum-value-removed
  endpoints:
    - method: GET
      path: /parties
    - method: GET
      path: /accounts/{AccountId}/parties
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change updates the `TrustFrameworkCode` enum (used by
    `VerifiedClaimVerification.TrustFramework` on both `GET /parties` and
    `GET /accounts/{AccountId}/parties`).

    In v2.1, `TrustFrameworkCode` declared a single value: `Undefined`.
    That value could not be produced on the wire by any conforming
    implementation. LFIs populate `trustFramework` via Ozone Connect's
    `CbuaeVerifiedClaim.verification.trustFramework`, whose own schema
    enum is `[FI]`; the Hub forwards the value to the TPP surface without
    translation. Every real response reaching a TPP therefore carried
    `FI` — a value the standards enum did not declare — while
    `Undefined` (the only declared value) could not be emitted by any
    conforming LFI.

    v2.1-errata1 replaces `Undefined` with `FI`, bringing the standards
    contract into line with what TPPs have always received. Formally
    this is an enum-value removal; in practice no consumer could have
    relied on `Undefined` because no conforming implementation could
    have produced it. Ozone Connect itself needs no change — it already
    carries `[FI]`.

    Richer values (UAE Pass digital identity, Emirates ID physical
    verification) are deferred to v3.0 — see
    `supporting/future-updates/standards/v3.0/uae-account-information-openapi/`.

    oasdiff classifies response enum-value removal as a warning rather
    than an ERR (a server emitting fewer values narrows — not broadens —
    the consumer contract). This entry is recorded for historical
    traceability regardless of test-level enforcement.

- rule: response-property-type-changed
  endpoints:
    - method: GET
      path: /account-access-consents
    - method: GET
      path: /account-access-consents/{ConsentId}
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change corrects a long-standing modelling error in v2.1.

    In v2.1, the Data/Permissions array references AEBankDataSharingConsentPermissionCodesItem
    as its items schema. However, that schema is itself defined as type: array
    of string enums. Because Permissions is also defined as type: array with
    items: $ref: ..., the resulting contract becomes a two-dimensional
    structure (array<array<string-enum>>).

    This structure is inconsistent with both intended design and real-world
    usage. No known implementation has ever returned nested arrays for
    Permissions, and consumers universally expect a flat array of permission
    codes.

    In v2.1-errata1, this is corrected by introducing
    AEBankDataSharingConsentPermissionCodes as a type: string enum. When used
    as the items schema of Permissions, this produces the correct and
    intended shape: a flat array<string-enum> (e.g.,
    ["ReadAccountsBasic", "ReadBalances", ...]), which matches all known
    production implementations.
