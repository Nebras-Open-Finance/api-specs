# Accepted breaking changes introduced in this version of the spec.
#
# Each entry is matched against oasdiff's ERR-level output. An entry is
# considered matching if its `rule` (or any of its `rules`) matches AND any
# of its `endpoints` matches the (method, path) of the change. Matched
# changes are filtered out before the test asserts.
#
# Format:
#   - rule: <oasdiff rule code>   # or `rules: [a, b, c]` for multiple
#     endpoints:
#       - method: GET
#         path: /some/path/{Param}
#     signedOffBy: Name - Role, Org
#     rationale: |
#       Free text written from the perspective of the change author,
#       explaining what changed, why, and the impact on consumers.

- rules:
    - request-body-additional-properties-removed
    - request-property-additional-properties-removed
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change tightens the `Risk` object's nested object schemas by
    adding `additionalProperties: false` throughout the Risk tree on the
    Payments side, mirroring the strictness already present on the PAR
    side (`uae-authorization-endpoints-openapi.yaml`).

    In v2.1, the Payments `AERisk` schema and its descendants
    (`AEDebtorIndicators`, `AETransactionIndicators`, `AECreditorIndicators`,
    and the inline `DestinationDeliveryAddress`) were silently permissive:
    unknown properties sent by a TPP were accepted without complaint. The
    PAR-side equivalent (`AEBankServiceInitiationRichAuthorizationRequests.AERisk`)
    has always rejected unknown properties via `additionalProperties: false`.

    A TPP therefore could not send the same Risk object to PAR and to
    POST /payments with confidence â€” fields the Hub accepted at /payments
    would be rejected at /par. This was a fraud-relevant divergence
    (Risk is the input to risk/fraud scoring) that the new
    Risk-parity test under `supporting/tests/standards/` now enforces.

    The `SupplementaryData` objects under `DebtorIndicators`,
    `TransactionIndicators`, and `CreditorIndicators` are intentionally
    excluded from this tightening: they are extension points and remain
    open to consumer-specific properties.

    Impact: TPPs that have been sending extra, undeclared properties in
    Risk to POST /payments, POST /file-payments, or POST /payment-consents
    will receive validation errors in v2.1-errata2. The remedy is to
    remove the extra properties or, where appropriate, place them under
    the relevant `SupplementaryData` block.

- rule: request-property-enum-value-removed
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    `AEAccountTypeCode` (used by `Risk.CreditorIndicators.AccountType`)
    previously declared `[Retail, Corporate]`. In v2.1-errata2 it is
    aligned with the api-hub's `AEAccountTypeCode` and the Standards PAR
    surface to `[Retail, SME, Corporate]`. This is technically an enum
    expansion (additive on the value set), but is recorded here for
    traceability of the cross-spec alignment work â€” see the matching
    entry under `uae-authorization-endpoints-openapi/` and the rationale
    there for the full context.

- rules:
    - request-property-min-length-set
    - request-property-max-length-set
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    `Risk.DestinationDeliveryAddress.NationalAddress.AddressLine.items`
    on the PAR side now carries `minLength: 1` / `maxLength: 70`,
    matching the constraints already present on the Payments side. This
    entry covers the converse direction for completeness â€” Payments has
    long enforced these bounds, but the parity test surfaced them as a
    divergence with PAR and the cross-spec convergence is being recorded
    here.

- rule: request-property-removed
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    Recorded for completeness and traceability. oasdiff classifies this
    change as a warning, not an ERR, so the breaking-changes test does not
    require the entry; it is documented here alongside the equivalent
    ERR-level record under `uae-authorization-endpoints-openapi/`.

    The international Creditor party
    (`PersonalIdentifiableInformation.Initiation.Creditor` in the
    International Payment PII variant) is restructured from a single flat
    `object` into a `oneOf` of an Individual and an Organization variant,
    discriminated by `IdentityType`, for SWIFT SR2026 alignment. Because the
    Payments-side PII models the Creditor as a single object â€” the PAR side
    (`uae-authorization-endpoints-openapi.yaml`) models it as an array â€” oasdiff
    reports the change here as removal of the previous direct `Creditor.Name`
    and `Creditor.PostalAddress` properties rather than as a property type
    change. Removing optional request properties is backward compatible: both
    properties continue to exist inside the new Individual and Organization
    variants, so a TPP sending the previous flat Creditor object remains
    valid.

    Impact: TPPs gain the structured Individual / Organization beneficiary
    attributes required for cross-border payments (name parts,
    `RelationshipToSender`, `DateOfBirth`, `Nationality`, `SourceOfFunds` /
    `SourceOfIncome`, identity `Evidence`, and organisation identifiers such
    as `AnyBIC` / `LEI`). Domestic Creditor schemas are unchanged.

- rules:
    - request-property-became-required
    - request-property-max-length-decreased
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    The international Creditor Agent's `PostalAddress`
    (`PersonalIdentifiableInformation.Initiation.CreditorAgent.PostalAddress`
    in the International Payment PII variant) is aligned onto the same address
    schema as the international Creditor, as part of the SWIFT SR2026 work.
    Both now reference a single shared `AEInternationalAddress` (renamed from
    `AEInternationalCreditorAddress`); the Creditor Agent previously
    referenced the legacy `AEAddress`.

    Relative to `AEAddress`, `AEInternationalAddress` makes `TownName` required
    and tightens its `maxLength` from 140 to 70 (the ISO 20022
    `PostalAddress27` `Max70Text` bound), which oasdiff reports as
    `request-property-became-required` and
    `request-property-max-length-decreased` on the Creditor Agent `TownName`.

    Rationale: ISO 20022 models both a party address (`Cdtr`) and a financial
    institution address (`CdtrAgt/FinInstnId`) with the same `PostalAddress27`
    type, so a single shared schema is the more standards-faithful design and
    removes the divergence between the two international address shapes. The
    agent `PostalAddress` remains optional, so a BIC-only Creditor Agent is
    unaffected.

    Impact: a TPP that supplies an international Creditor Agent address must
    now include `TownName` and keep it within 70 characters. See the matching
    entry under `uae-authorization-endpoints-openapi/` for POST /par.
