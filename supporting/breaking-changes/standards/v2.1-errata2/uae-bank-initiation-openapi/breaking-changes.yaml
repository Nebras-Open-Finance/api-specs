# Accepted breaking changes introduced in this version of the spec.
#
# Each entry is matched against oasdiff's ERR-level output. An entry is
# considered matching if its `rule` (or any of its `rules`) matches AND any
# of its `endpoints` matches the (method, path) of the change. Matched
# changes are filtered out before the test asserts.
#
# Format:
#   - rule: <oasdiff rule code>   # or `rules: [a, b, c]` for multiple
#     endpoints:
#       - method: GET
#         path: /some/path/{Param}
#     signedOffBy: Name - Role, Org
#     rationale: |
#       Free text written from the perspective of the change author,
#       explaining what changed, why, and the impact on consumers.

- rules:
    - request-body-additional-properties-removed
    - request-property-additional-properties-removed
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    This change tightens the `Risk` object's nested object schemas by
    adding `additionalProperties: false` throughout the Risk tree on the
    Payments side, mirroring the strictness already present on the PAR
    side (`uae-authorization-endpoints-openapi.yaml`).

    In v2.1, the Payments `AERisk` schema and its descendants
    (`AEDebtorIndicators`, `AETransactionIndicators`, `AECreditorIndicators`,
    and the inline `DestinationDeliveryAddress`) were silently permissive:
    unknown properties sent by a TPP were accepted without complaint. The
    PAR-side equivalent (`AEBankServiceInitiationRichAuthorizationRequests.AERisk`)
    has always rejected unknown properties via `additionalProperties: false`.

    A TPP therefore could not send the same Risk object to PAR and to
    POST /payments with confidence — fields the Hub accepted at /payments
    would be rejected at /par. This was a fraud-relevant divergence
    (Risk is the input to risk/fraud scoring) that the new
    Risk-parity test under `supporting/tests/standards/` now enforces.

    The `SupplementaryData` objects under `DebtorIndicators`,
    `TransactionIndicators`, and `CreditorIndicators` are intentionally
    excluded from this tightening: they are extension points and remain
    open to consumer-specific properties.

    Impact: TPPs that have been sending extra, undeclared properties in
    Risk to POST /payments, POST /file-payments, or POST /payment-consents
    will receive validation errors in v2.1-errata2. The remedy is to
    remove the extra properties or, where appropriate, place them under
    the relevant `SupplementaryData` block.

- rule: request-property-enum-value-removed
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    `AEAccountTypeCode` (used by `Risk.CreditorIndicators.AccountType`)
    previously declared `[Retail, Corporate]`. In v2.1-errata2 it is
    aligned with the api-hub's `AEAccountTypeCode` and the Standards PAR
    surface to `[Retail, SME, Corporate]`. This is technically an enum
    expansion (additive on the value set), but is recorded here for
    traceability of the cross-spec alignment work — see the matching
    entry under `uae-authorization-endpoints-openapi/` and the rationale
    there for the full context.

- rules:
    - request-property-min-length-set
    - request-property-max-length-set
  endpoints:
    - method: POST
      path: /payment-consents
    - method: POST
      path: /payments
    - method: POST
      path: /file-payments
  signedOffBy: Thomas Catchpole - CTO, Nebras
  rationale: |
    `Risk.DestinationDeliveryAddress.NationalAddress.AddressLine.items`
    on the PAR side now carries `minLength: 1` / `maxLength: 70`,
    matching the constraints already present on the Payments side. This
    entry covers the converse direction for completeness — Payments has
    long enforced these bounds, but the parity test surfaced them as a
    divergence with PAR and the cross-spec convergence is being recorded
    here.
