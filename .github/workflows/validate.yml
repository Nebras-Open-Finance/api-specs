name: Validate Source Branch

on:
  pull_request:
    branches: [main]

jobs:
  validateExpected:
    name: validateExpected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI specs
        run: npm test
