name: Validate Source Branch

on:
  pull_request:
    branches: [main]

jobs:
  validateExpected:
    name: validateExpected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install oasdiff
        run: |
          OASDIFF_VERSION=1.14.0
          curl -sSL "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" | tar xz oasdiff
          sudo mv oasdiff /usr/local/bin/
          oasdiff --version

      - name: Validate OpenAPI specs
        run: npm test
