openapi: 3.0.1
servers:
  - url: https://<your-ozone-hh-server>
info:
  title: Headless Heimdall APIs
  contact:
    name: Ozone Financial Technology Limited
  description: >
    This document provides an API description in [OpenAPI](https://spec.openapis.org/oas/v3.0.1.html) for the "Headless
    Heimdall" or Authorization Server APIs.


    This document provides the OpenAPI description for the APIs provided by Headless Heimdall.


    These APIs are implemented by Ozone and should be called by the financial institution at the end of their
    authorization journeys.


    The interface allows an financial institution to develop the user interface for customers without having to deal
    with the complexities of OpenID Connect (OIDC) and the FAPI 2.0 Security Profile and without having to gain a
    thorough understanding of the constraints placed by FAPI.


    The interface consists of three operations, which are called when User authentication is initiated and after it is
    completed.


    > Please note that where an operation name is used it references the `operationId` value for a given endpoint and
    HTTP method.


    Initiating Authorization is supported by the `getAuth` operation:


    - The `getAuth` operation (`get /auth`) should be called by the financial
      institution at the beginning of an authorization code grant. This is typically
      immediately after it receives an authorization request from a TPP.


    Completing Authorization is supported by the  `doConfirm` and `doFail` operations:


    - The `doConfirm` operation (`post /auth/{interactionId}/doConfirm`)  should be
      called by the financial institution to notify Heimdall that an interaction has
      completed successfully.


    - The `doFail` operation (`post /auth/{interactionId}/doFail`) operation should be
      called by the financial institution to notify Heimdall that the interaction has
      failed.


    ### Versioning

    The `version` property implements the following pattern
    `{standards-major}.{standards-minor}.{ozone-connect-version}`, where:


    * `standards-major` is the major version of the latest UAE standard that the API description implements.


    * `standards-minor` is the minor version of the latest UAE standard that the API description implements.


    * `ozone-connect-version` is the version of the Ozone Connect API description.


    So, for example, `v2.0.1` indicates the first version of the Ozone Connect API description that implements the UAE
    standard version 2.0.


    **Please adhere to the deprecated flags in your implementation. Do not implement deprecated properties when**
    **implementing new functionality.**


    **Please use the OpenAPI description document attached to the page if you reading this in Confluence to check**
    **for deprecated properties.**

    ### v2.1.3

    * Added the `authorization_details` Rich Authorization Request (RAR) to the `getAuth` success
    response, along with the additional `interaction` and `params` properties returned by the operation. The RAR
    schema set mirrors the consent payload defined in the API Hub Consent Manager.

    ### v2.1.2

    * Changed description of RAR objects to clarify expected usage.
  version: v2.1.3
tags:
  - name: Initiate Authorization
    description: Operations that support initiating the authorization of a User
  - name: Complete Authorization
    description: Operations that support completing the authorization of a User, indicating either success or failure
  - name: health-check
    description: Operations that support checking the health of the API Hub
security:
  - {}
  - OzoneConnectJwtAuth: []
paths:
  /auth:
    get:
      tags:
        - Initiate Authorization
      summary: Initiate an authorisation interaction
      operationId: getAuth
      description: >
        The `getAuth` operation should be called by the financial institution at the beginning of the

        interaction. The operation validates all the parameters that are passed to it to ensure that the

        authorization request is FAPI compliant and has only the client_id` and `redirect_uri` parameters.


        The operation responds with one of the three outcomes:


        - __Success__: The operation returns a status 200. The body contains a JSON object with the

        interaction and all the query parameters extracted from the OIDC request object.


        - __Non-redirectable failure__: This indicates a failure where validation of the OIDC Client

        failed. The financial institution should render an error page and end the interaction.


        - __Redirectable failure__: This indicates a failure where the OIDC client has been validated

        but validation of the parameters of the Authorization Request failed. The operation therefore

        responds with a 303 redirect, which the financial institution must use to redirect the User **without
        modification**.


        ### Processing a success response


        There are two properties in the success response that financial institutions are likely to be interested in:


        - `interaction.interactionId`: The interaction identifier that should be used with

        subsequent calls to Headless Heimdall when this authorization request is completed by the financial institution.


        - `tpp.directoryRecord`: Where Ozone is integrated with a Directory Service, this contains a record

        of the TPP record as held on the directory. The structure of the record will depend on the directory. Directory
        record as held by Ozone in base 64 encoded format.


        ### Parameters


        When calling this API, the financial institution must pass on **all the query parameters or hash parameters**
        received from the TPP

        in the authorization request. The FAPI 2.0 Security Profile states that a Client will **_only_** send the
        `client_id` and `request_uri` values, as

        specified by the [Profile](https://openid.bitbucket.io/fapi/fapi-2_0-security-profile.html#section-5.3.3.2-2.6).
        However, Heimdall is

        the authoritative source for making that decision, hence all query parameters must be passed on. No query
        parameters are therefore

        defined here as a result.
      responses:
        '200':
          description: |
            This indicates that the parameters were successfully validated.

            The financial institution should continue with the next stages of the interaction, using the `interactionId`
            as the unique identifier with which to track the interaction with the User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '303':
          description: |
            This indicates that the parameters were not successfully verified.

            However, there were no indications that the request originated from an invalid client.

            The financial institution should respond to the customer with a redirect to the URI returned by the API
            (including the query or hash parameters included in the URL)
        '400':
          description: |
            This indicates that the parameters were not successfully verified.

            Heimdall could not verify that the request originated from a valid client.

            The financial institution should render an error page and __must not__ redirect back to the TPP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /auth/{interactionId}/doConfirm:
    post:
      operationId: doConfirm
      tags:
        - Complete Authorization
      summary: End an authorisation interaction with a success response
      description: >
        The `doConfirm` operation should be called by the financial institution once the

        user interaction has been completed and the resource owner has authorized

        access. This operation updates the interaction state and generates an OIDC

        Authorization Code value - `code` - and the rest of the response that should be

        returned to the TPP.


        When supported by Security Profile the financial institution can specify the

        set of claims to be added to the ID Token. Heimdall creates an ID Token with

        these claims along with any claims required by FAPI and OIDC. Please note that

        under the FAPI 2.0 Security Profile ID Tokens are not supported in the front

        channel, and therefore will not be returned to the Client as the result of an

        interaction. Please refer to the [Security
        Profile](https://openid.bitbucket.io/fapi/fapi-2_0-security-profile.html#table-1)

        for more details.


        Heimdall returns a 303 with a redirect uri. This resource owner should be

        redirected to this URI.


        ### Parameters


        The request body can contain an arbitrary set of

        `application/x-www-form-urlencoded` name-value pairs. These are added by

        Heimdall to the ID Token. The claim name is set to the parameter name and the

        claim value to the parameter value.


        Claim names prefixed by `heimdall.` act as control parameters for the tokens

        that are produced. These claims are not added to the ID Token.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              description: >-
                Where supported, allows a financial institution to send parameters that control the lifetime of Access
                Tokens and availability of Refresh Tokens. These features are not supported for the UAE Open Finance
                Framework. Financial institutions can, however, add claims that will be included in an ID Token, which
                can be requested by a TPP dependent on the OAuth scope granted by the User.
              type: object
      parameters:
        - $ref: '#/components/parameters/InteractionId'
      responses:
        '303':
          description: |
            A redirect URI that contains an authorization code along with additional
            parameters as required by OIDC.

            If an internal error occurs during processing of the request an `error` and
            `error_description` parameters will be returned.

            The redirect URI must be returned to the User to redirect them back to the TPP.
  /auth/{interactionId}/doFail:
    post:
      operationId: doFail
      tags:
        - Complete Authorization
      summary: End an authorisation interaction with a failure response
      description: |
        The `doFail` operation should be called by the financial institution once the
        User interaction has been completed and has resulted in a failure to grant
        access to the TPP. Examples failure scenarios include:

        * The User does not authenticate successfully.

        * The User declines the authorisation of consent.

        The `doFail` operation updates the interaction state, generates an OIDC `error`
        and returns the rest of the response that should be returned to the TPP.

        The financial institution can specify the `error` and `error_description` as
        x-www-form-urlencoded parameters. If `error` and `error_description` omitted
        then default values will be returned in the redirect URI.

        Heimdall returns a 303 with a redirect URI, which should be sent to the
        User to redirect them to the TPP.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                error:
                  type: string
                  description: |
                    An OAuth2.0 or OIDC error
                error_description:
                  type: string
      parameters:
        - $ref: '#/components/parameters/InteractionId'
      responses:
        '303':
          description: |
            A redirect URI that contains the parameters required to indicate the error to
            the TPP.

            If an internal error occurs during processing of the request an `error` and
            `error_description` parameters will be returned.

            The redirect URI must be returned to the User to redirect them back to the TPP.
  /hello-mtls:
    get:
      operationId: helloMtls
      tags:
        - health-check
      summary: check connectivity including mtls and provides information about the client cert that the server received
      description: >-
        This health check is used to check that the end-to-end network connectivity is working as expected including
        mutual tls. This health check endpoint assists in debugging mutual tls client issues. The health check returns
        information about the client certificate and the issuer of the client certificate that the server received.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckCertResponse'
components:
  schemas:
    InteractionId:
      description: >-
        Unique identifier for the interaction with the User. Please note that this identifier may not be returned with
        errors from the `get /auth` operation as the interaction may not have been initiated due to an invalid request.
      type: string
    AuthSuccessResponse:
      type: object
      properties:
        interaction:
          description: The properties of a successfully initiated interaction
          type: object
          properties:
            interactionId:
              $ref: '#/components/schemas/InteractionId'
            params:
              description: >-
                Query parameters unbundled from the original authorization request, including query parameters, hash
                parameters, and properties of the JWT-Secured Authorization Request (JAR) sent in the Pushed
                Authorization Request.
              type: object
              properties:
                client_id:
                  description: >-
                    The `client_id` value that the caller claims to have. At this stage, Heimdall has verified that the
                    `client_id` exists.
                  type: string
                response_type:
                  description: >-
                    The request grant type. This will default to `code` for the CBUAE release as per the constraints of
                    the FAPI 2.0 Security Profile
                  type: string
                  enum:
                    - code
                scope:
                  type: string
                request:
                  type: string
                scopes:
                  description: The requested scopes in the Authorization Request
                  type: array
                  items:
                    type: string
                claims:
                  description: The requested claims in the Authorization Request.
                  type: object
                login_hint:
                  description: >-
                    The value of the `login_hint` parameter sent in the Pushed Authorization request. This value is
                    expected to be encrypted as a JWE.
                  type: string
                authorization_details:
                  description: >-
                    The Rich Authorization Request(s) unbundled from the JWT-Secured Authorization Request (JAR). Each
                    element carries the consent payload for one of the supported consent types. Although the array can
                    in principle contain multiple RARs, only a single RAR is supported in a Pushed Authorization
                    Request at the time of writing.
                  type: array
                  items:
                    $ref: '#/components/schemas/AuthorizationDetails'
                client_assertion:
                  description: The client assertion (a signed JWT) the TPP uses to authenticate to the authorization server.
                  type: string
                client_assertion_type:
                  description: The type of the `client_assertion`. For the CBUAE implementation this is the JWT bearer assertion type.
                  type: string
                redirect_uri:
                  description: The URI to which the User is redirected once the authorization interaction is complete.
                  type: string
                aud:
                  description: The audience of the request object - the authorization server the request is intended for.
                  type: string
                iss:
                  description: The issuer of the request object - the `client_id` of the TPP.
                  type: string
                exp:
                  description: The expiry time of the request object, as a Unix epoch timestamp in seconds.
                  type: number
                nbf:
                  description: The "not before" time of the request object, as a Unix epoch timestamp in seconds.
                  type: number
                nonce:
                  description: A unique value used to associate a client session with an ID Token and to mitigate replay attacks.
                  type: string
                state:
                  description: An opaque value used by the TPP to maintain state between the authorization request and the callback.
                  type: string
                code_challenge:
                  description: The PKCE code challenge derived from the code verifier, as defined by RFC 7636.
                  type: string
                code_challenge_method:
                  description: The PKCE code challenge method used to derive the code challenge.
                  type: string
                  enum:
                    - S256
                max_age:
                  description: The maximum authentication age, in seconds, as defined by OpenID Connect.
                  type: number
            claims:
              type: object
            queryParameters:
              description: >-
                The raw query and hash parameters received in the authorization request from the TPP, prior to
                unbundling the JWT-Secured Authorization Request (JAR).
              type: object
            client_id:
              description: The `client_id` of the TPP associated with the interaction.
              type: string
            interactionStartedAt:
              description: The time at which the interaction was started, as a Unix epoch timestamp in milliseconds.
              type: number
            interactionStartedAtIso:
              description: The time at which the interaction was started, in ISO 8601 date-time format.
              type: string
              format: date-time
            interactionStartedApiLogId:
              description: Identifiers correlating the interaction to API Hub log entries.
              type: object
              properties:
                ozoneInteractionId:
                  description: The Ozone-assigned identifier for the interaction, used for log correlation.
                  type: string
            status:
              type: string
            consentId:
              type: string
              description: An identifier for consent
              deprecated: true
            consentIdsList:
              type: array
              description: >
                Consent Ids associated with the interaction.

                Rich Authorization Requests (RAR) can contain multiple consent payloads. At the time of writing, however
                only a single RAR is supported in a Pushed Authorization Request.
              items:
                type: string
        tpp:
          $ref: '#/components/schemas/tpp'
    AuthErrorResponse:
      description: Provides details of the authorization error. Includes OAuth 2.0 error properties
      type: object
      required:
        - error
        - error_description
      properties:
        noRedirect:
          description: >-
            An indicator that defines whether the End User should be redirected back to the Client due to the error.
            Please note that relates to an earlier release and Heimdall and is therefore deprecated for the CBUAE
            implementation.
          type: boolean
          deprecated: true
        error:
          description: The error code as defined by [RFC 6749](https://datatracker.ietf.org/doc/html/rfc6749#section-4.1.2.1)
          type: string
        error_description:
          description: >-
            The error description as defined by [RFC
            6749](https://datatracker.ietf.org/doc/html/rfc6749#section-4.1.2.1)
          type: string
        interactionId:
          $ref: '#/components/schemas/InteractionId'
    tpp:
      description: >-
        The TPP record as held by Ozone. If Ozone TPP Connect has been integrated into a directory, the
        `directoryRecord` provides the TPP's directory record as held by Ozone in base 64 encoded format.
      type: object
      required:
        - clientId
        - orgId
        - softwareStatementId
        - tppId
        - tppName
        - decodedSsa
      properties:
        clientId:
          description: The client identifier for the TPP as issued by the Trust Framework
          type: string
          pattern: ^.*[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
        tppId:
          description: The identifier used by the API Hub to uniquely identify the TPP
          type: string
        tppName:
          description: The TPP name recorded in the Trust Framework
          type: string
        obieTppId:
          description: The UK market TPP identifier. This property is not used for CBUAE and is therefore marked as deprecated.
          type: string
          deprecated: true
        softwareStatementId:
          description: The software statement identifier for the Client.
          type: string
        obieSoftwareStatementId:
          description: >-
            The UK market software statement identifier. This property is not used for CBUAE and is therefore marked as
            deprecated.
          type: string
          deprecated: true
        obieSoftwareStatementName:
          description: >-
            The UK market software statement name. This property is not used for CBUAE and is therefore marked as
            deprecated.
          type: string
          deprecated: true
        directoryRecord:
          type: string
          description: >-
            The latest copy of the TPP directory record retrieve from the CBUAE Trust Framework directory, encoded as a
            Base 64 string
          format: base64
        ssa:
          description: >-
            The encoded Software Statement Assertion. This property is not used for CBUAE and is therefore marked as
            deprecated.
          type: string
          deprecated: true
        decodedSsa:
          $ref: '#/components/schemas/softwareStatementProperties'
        orgId:
          description: The organization identifier for the TPP
          type: string
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    softwareStatementProperties:
      description: |
        The decoded software statement retrieved from the Trust Framework that provides
        the properties of the Client.

        Please note:

          - The JSON payload will contain other properties in addition to those listed
            here. The properties listed here are considered most relevant for activities
            such as TPP logo retrieval and JWS verification.
          - The content reflects elements of discovery metadata, which in generally
            defined as a file rather than an API. Providing constraints such as
            `minLength` and `maxLength` is impractical in this context

        The full software statement record is also available in the Trust Framework.
        Please also refer the Registration Framework page in the CBUAE standards for
        additional guidance on these properties.
      type: object
      properties:
        redirect_uris:
          description: The redirect URIs registered by the TPP at the Trust Framework
          type: array
          items:
            type: string
        client_name:
          description: Name of the Client to be presented to the End-User.
          type: string
        client_uri:
          description: URL of the home page of the Client.
          type: string
        logo_uri:
          description: URL of the Client logo.
          type: string
        jwks_uri:
          description: URL of the Client JSON Web Key Set (JWKS) at the Trust Framework.
          type: string
        client_id:
          description: Unique Client Identifier.
          type: string
        roles:
          description: The roles under which the organization is registered at the Trust Framework.
          type: array
          items:
            type: string
        sector_identifier_uri:
          description: >-
            URL using the https scheme to be used in calculating Pseudonymous Identifiers by the OP. Allows redirect URI
            values to be grouped, easing registration management.
          type: string
        application_type:
          description: Client application type.
          type: string
        organisation_id:
          description: Organization identifier for organization that owns the Client.
          type: string
    HealthCheckCertResponse:
      type: object
      properties:
        connectionEstablished:
          type: boolean
        mtlsStatus:
          type: string
          enum:
            - established
            - not-established
        hostName:
          type: string
        clientCertificate:
          type: object
          properties:
            subject:
              type: string
            issuer:
              type: string
          required:
            - subject
            - issuer
      required:
        - connectionEstablished
        - mtlsStatus
        - hostName
        - clientCertificate
    AEInsuranceOpenFinanceBillingPost:
      type: object
      required:
        - Purpose
      properties:
        Purpose:
          description: Purpose of data sharing request
          type: string
          enum:
            - AccountAggregation
            - RiskAssessment
            - PremiumHistory
            - ClaimHistory
            - Onboarding
            - Verification
            - QuoteComparison
            - FinancialAdvice
      description: Billing parameters specified by the TPP
      additionalProperties: false
    AEBankDataSharingRichAuthorizationRequests.AEBankDataSharingFromDate:
      type: string
      format: date
      description: >-
        Specified start date for the transaction or statement query period.


        If this is not populated, the start date will be open ended, and data will be returned from the earliest
        available transaction or statement.


        All dates in the JSON payloads are represented in ISO 8601 date format.  For example: 2025-01-01
    AEBankDataSharingRichAuthorizationRequests.AEBankDataSharingToDate:
      type: string
      format: date
      description: >-
        Specified end date for the transaction or statement query period.


        If this is not populated, the end date will be open ended, and data will be returned to the latest available
        transaction or the last statement generated.


        All dates in the JSON payloads are represented in ISO 8601 date format.  For example: 2025-12-31    
    AEAccountAccessOpenFinanceBillingPost:
      type: object
      required:
        - UserType
        - Purpose
      properties:
        UserType:
          description: Type of Customer
          type: string
          enum:
            - Retail
            - SME
            - Corporate
        Purpose:
          description: Purpose of data sharing request
          type: string
          enum:
            - AccountAggregation
            - RiskAssessment
            - TaxFiling
            - Onboarding
            - Verification
            - QuoteComparison
            - BudgetingAnalysis
            - FinancialAdvice
            - AuditReconciliation
      description: Billing parameters specified by the TPP
      additionalProperties: false
    AEAccountAccessConsentPermissionCodes:
      type: string
      enum:
        - ReadAccountsBasic
        - ReadAccountsDetail
        - ReadBalances
        - ReadBeneficiariesBasic
        - ReadBeneficiariesDetail
        - ReadFXTransactionsBasic
        - ReadFXTransactionsDetail
        - ReadTransactionsBasic
        - ReadTransactionsDetail
        - ReadProduct
        - ReadScheduledPaymentsBasic
        - ReadScheduledPaymentsDetail
        - ReadDirectDebits
        - ReadStandingOrdersBasic
        - ReadStandingOrdersDetail
        - ReadStatements
        - ReadConsents
        - ReadPartyUser
        - ReadPartyUserIdentity
        - ReadParty
        - ReadProductFinanceRates
      description: |-
        Specifies the permitted account access policy data types.
        This is a list of the data groups being consented by the User, and requested for authorization with the LFI.
    AEAccountSubTypeCode:
      type: string
      enum:
        - CurrentAccount
        - Savings
        - CreditCard
        - Mortgage
        - Finance
      description: Specifies the sub type of account (product family group)
    AEAccountTypeCode:
      type: string
      enum:
        - Retail
        - SME
        - Corporate
      description: Specifies the type of account (Retail, SME or Corporate).
    AEBaseConsentId:
      type: string
      minLength: 1
      maxLength: 128
      description: The original ConsentId assigned by the TPP
    AEConsentId:
      type: string
      minLength: 1
      maxLength: 128
      description: Unique identification assigned by the TPP to identify the consent resource.
    AEOnBehalfOf:
      type: object
      properties:
        TradingName:
          type: string
          description: Trading Name
        LegalName:
          type: string
          description: Legal Name
        IdentifierType:
          allOf:
            - $ref: '#/components/schemas/AEOnBehalfOfIdentifierType'
          description: Identifier Type
        Identifier:
          type: string
          description: Identifier
      additionalProperties: false
    AEOnBehalfOfIdentifierType:
      type: string
      enum:
        - Other
    AEInsuranceConsentPermissions:
      description: >-
        The permissions codes available to TPPs. Codes are qualified by insurance type which allows multiple sets of
        permissions to be selected in each consent.
      type: object
      required:
        - InsuranceType
        - Permissions
      properties:
        InsuranceType:
          type: string
          enum:
            - Employment
            - Health
            - Home
            - Life
            - Motor
            - Renters
            - Travel
          description: The insurance sector to which the permissions relate.
        Permissions:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceConsentPermissionCodes'
          minItems: 1
          description: >-
            The data clusters requested by the TPP, based on agreement with the User. Data will be returned based on the
            selected permissions.
      additionalProperties: false
    AEInsuranceConsentPermissionCodes:
      type: string
      enum:
        - ReadInsurancePolicies
        - ReadCustomerBasic
        - ReadCustomerDetail
        - ReadCustomerPaymentDetails
        - ReadInsuranceProduct
        - ReadCustomerClaims
        - ReadInsurancePremium
    AECurrencyRequest:
      description: >
        The details of the non-local currency or FX request that has been agreed between the User and the TPP.

        The requested ChargeBearer and ExchangeRateInformation are included in this object may be overwritten by the LFI
        in the returned Consent object.
      type: object
      additionalProperties: false
      required:
        - CurrencyOfTransfer
      properties:
        InstructionPriority:
          description: >-
            Indicator of the urgency or order of importance that the instructing party would like the instructed party
            to apply to the processing of the instruction.
          type: string
          enum:
            - Normal
            - Urgent
        ExtendedPurpose:
          description: Specifies the purpose of an international payment.
          type: string
          minLength: 1
          maxLength: 140
        ChargeBearer:
          $ref: '#/components/schemas/AEChargeBearerType1Code'
        CurrencyOfTransfer:
          description: >-
            Specifies the currency of the to be transferred amount, which is different from the currency of the debtor's
            account.
          type: string
          pattern: ^[A-Z]{3,3}$
        DestinationCountryCode:
          description: >-
            Country in which Credit Account is domiciled. Code to identify a country, a dependency, or another area of
            particular geopolitical interest, on the basis of country names obtained from the United Nations (ISO 3166,
            Alpha-2 code).
          type: string
          pattern: '[A-Z]{2,2}'
        ExchangeRateInformation:
          type: object
          additionalProperties: false
          required:
            - UnitCurrency
            - RateType
          description: Provides details on the currency exchange rate and contract.
          properties:
            UnitCurrency:
              description: >-
                Currency in which the rate of exchange is expressed in a currency exchange. In the example 1GBP =
                xxxCUR, the unit currency is GBP.
              type: string
              pattern: ^[A-Z]{3,3}$
            ExchangeRate:
              description: >-
                The factor used for conversion of an amount from one currency to another. This reflects the price at
                which one currency was bought with another currency.
              type: number
            RateType:
              description: Specifies the type used to complete the currency exchange.
              type: string
              enum:
                - Actual
                - Agreed
                - Indicative
            ContractIdentification:
              description: >-
                Unique and unambiguous reference to the foreign exchange contract agreed between the initiating
                party/creditor and the debtor agent.
              type: string
              minLength: 1
              maxLength: 256
        FxQuoteId:
          description: >-
            Required where the consent or payment initiation request relates to a previously quoted FX trade. The TPP
            must provide the `QuoteId` value where a long-lived consent exists, meaning that each payment initiation
            request will relate to a different `QuoteId` value.
          type: string
          minLength: 1
          maxLength: 128
    AERequestedExecutionDate:
      description: >
        The date when the TPP expects the LFI to execute the payment.

        The date must be in the future and cannot be on the same day or a day in the past.

        The maximum date in the future that can be specified is 1 year from the day of the consent of the User to the
        TPP.

        All dates in the JSON payloads are represented in ISO 8601 date format.
      type: string
      format: date
    AEChargeBearerType1Code:
      description: Specifies which party/parties will bear the charges associated with the processing of the payment transaction.
      type: string
      enum:
        - BorneByCreditor
        - BorneByDebtor
        - Shared
    AEPeriodType:
      type: string
      description: >
        A Period may begin from the Consent CreationDateTime if a PeriodStartDate is not provided.


        |Period Type|Description|

        |-----------|-----------|

        |Day|A continuous period of time, consisting of 24 consecutive hours, starting from midnight (00:00:00) and
        finishing at 23:59:59 of the same day. |

        |Week|A continuous period of time, consisting of seven consecutive days, starting from midnight (00:00:00) and
        finishing at 23:59:59 of the 7th day. |

        |Month|A continuous period of time starting from midnight (00:00:00) of the first day of a month and finishing
        at 23:59:59 of the last day of that month.|

        |Year|A continuous period of time, consisting of 12 months.|
      enum:
        - Day
        - Week
        - Month
        - Year
    AEPeriodStartDate:
      type: string
      description: |
        * Payments: Specifies the start date of when a payment schedule begins.
      format: date
    AuthorizationDetails:
      description: |
        The request body for creating a new consent.

        The body consists of the RAR request that is sent by the TPP to the authorization server.
      oneOf:
        - $ref: '#/components/schemas/DataSharingAuthorizationDetails'
        - $ref: '#/components/schemas/InsuranceAuthorizationDetails'
        - $ref: '#/components/schemas/ServiceInitiationAuthorizationDetails'
    DataSharingAuthorizationDetails:
      type: object
      properties:
        type:
          description: The Rich Authorization Request (RAR) type
          type: string
          pattern: ^urn:openfinanceuae:account-access-consent:v[0-9]+\.[0-9]+$
          example: urn:openfinanceuae:account-access-consent:v2.1
        consent:
          $ref: '#/components/schemas/AuthorizationDetailsDataSharingConsent'
        subscription:
          $ref: '#/components/schemas/EventNotification'
    InsuranceAuthorizationDetails:
      type: object
      properties:
        type:
          description: The Rich Authorization Request (RAR) type
          type: string
          pattern: ^urn:openfinanceuae:insurance-consent:v[0-9]+\.[0-9]+$
          example: urn:openfinanceuae:insurance-consent:v2.1
        consent:
          $ref: '#/components/schemas/AuthorizationDetailsInsuranceConsent'
        subscription:
          $ref: '#/components/schemas/EventNotification'
    ServiceInitiationAuthorizationDetails:
      type: object
      properties:
        type:
          description: The Rich Authorization Request (RAR) type
          type: string
          pattern: ^urn:openfinanceuae:service-initiation-consent:v[0-9]+\.[0-9]+$
          example: urn:openfinanceuae:service-initiation-consent:v2.1
        consent:
          $ref: '#/components/schemas/AEServiceInitiationAuthorizationDetailProperties'
        subscription:
          $ref: '#/components/schemas/EventNotification'
    AEServiceInitiationAuthorizationDetailProperties:
      type: object
      required:
        - ConsentId
        - PersonalIdentifiableInformation
        - ControlParameters
        - PaymentPurposeCode
        - ExpirationDateTime
      properties:
        ConsentId:
          $ref: '#/components/schemas/AEConsentId'
        BaseConsentId:
          $ref: '#/components/schemas/AEBaseConsentId'
        IsSingleAuthorization:
          $ref: '#/components/schemas/IsSingleAuthorization'
        AuthorizationExpirationDateTime:
          type: string
          format: date-time
          description: |2-
                A time by which a Consent (in AwaitingAuthorization status) must be Authorized by the User.
                The time window starts from the actual CreationDateTime (when the Consent is staged with the LFI).
                If the current time window exceeds the Authorization Expiration Time Window (and the Consent status is AwaitingAuthorization) then the Consent Status must be set to Rejected.
                The time window is based on a custom time format hhh:mm:ss. e.g. 720:00:00 represents a time window of 720 hours, 00 minutes, 00 seconds (30 days) after the CreationDateTime to Authorize the Consent.
        ExpirationDateTime:
          allOf:
            - $ref: '#/components/schemas/ARConsentExpirationDateTime'
          description: |2-
                Specified date and time the consent will expire.

                All dates in the JSON payloads are represented in ISO 8601 date-time format.
                All date-time fields in responses must include the timezone. An example is :2023-04-05T10:43:07+00:00
        Permissions:
          type: array
          items:
            $ref: '#/components/schemas/AEServiceInitiationConsentPermissionCodes'
          description: |
            Specifies the permitted Account Access data types.
            This is a list of the data groups being consented by the User, and requested for authorization with the LFI.

            This allows a TPP to request a balance check permission.
        CurrencyRequest:
          $ref: '#/components/schemas/AECurrencyRequest'
        PersonalIdentifiableInformation:
          description: >-
            Personal Identifiable Information, represented in both encoded and decoded form using a `oneOf`, to help
            implementers readily understand both the structure and serialized form of the property.

            **Implementations MUST reflect the AEJWEPaymentPII Schema Object** **structure and the notes provided on
            implementing a JWS and JWE** **The decoded form AEPaymentConsentPII is for guidance on content only**
          anyOf:
            - $ref: '#/components/schemas/AEPaymentConsentPII'
            - $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEDomesticPaymentPII'
            - $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEInternationalPaymentPII'
            - $ref: '#/components/schemas/AEJWEPaymentPII'
        ControlParameters:
          $ref: '#/components/schemas/AEServiceInitiationConsentControlParameters'
        DebtorReference:
          $ref: '#/components/schemas/AEServiceInitiationDebtorReference'
        CreditorReference:
          $ref: '#/components/schemas/AEServiceInitiationCreditorReference'
        PaymentPurposeCode:
          $ref: '#/components/schemas/AEServiceInitiationPaymentPurposeCode'
        SponsoredTPPInformation:
          $ref: '#/components/schemas/AEServiceInitiationSponsoredTPPInformation'
      additionalProperties: false
    ARConsentExpirationDateTime:
      type: string
      format: date-time
    AEServiceInitiationSponsoredTPPInformation:
      type: object
      required:
        - Name
        - Identification
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 50
          description: The Sponsored TPP Name
        Identification:
          type: string
          minLength: 1
          maxLength: 50
          description: The Sponsored TPP Identification
      description: |2-
            The Sponsored TPP is:
            * A TPP that itself has no direct Open Banking API integrations.
            * A TPP that is using the integration of another TPP that does have direct Open Banking API integrations.
      additionalProperties: false
    AEServiceInitiationPaymentPurposeCode:
      type: string
      minLength: 1
      maxLength: 3
      pattern: ^[A-Z]{3}$
      description: >-
        A category code that relates to the type of services or goods that corresponds to the underlying purpose of the
        payment. The code must conform to the published Aani payment purpose code list.
    AEServiceInitiationCreditorReference:
      anyOf:
        - description: >
            **DEPRECATED AT v2.1**

            A reason or reference in relation to a payment, set to facilitate a structured Creditor reference consisting of:


            * TPP ID and BIC for the Debtor Account, followed by freeform text to a maximum of 120 characters.


            The TPP ID value will match the organization ID value from the Trust Framework, and therefore will be a v4 UUID.


            A BIC is specific according to the standard format for ISO 20022, and can therefore be either 8 or 11 characters
            in length.


            If the value of the concatenated string exceeds 120 characters, the TPP must first omit or truncate the freeform
            element of the reference.
          type: string
          minLength: 1
          maxLength: 120
          pattern: >-
            ^TPP=[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12},BIC=[A-Z0-9]{4}[A-Z0-9]{2}[A-Z0-9]{2}([A-Z0-9]{3}){0,1}($|,.+$)
          deprecated: true
        - description: |-
            A Creditor Reference is a note for a given Creditor or Creditor LFI that supports reconciliation of
            a given payment instruction.
          type: string
          minLength: 1
          maxLength: 35
    AEServiceInitiationDebtorReference:
      anyOf:
        - description: >
            **DEPRECATED AT v2.1**

            A reason or reference in relation to a payment, set to facilitate a structured Debtor reference consisting of:


            * For payments to Merchants: TPP ID, Merchant ID, BIC for the Creditor Account, followed by freeform text to a
            maximum of 120 characters.


            * For other payments: TPP ID and BIC for the Creditor Account, followed by freeform text to a maximum of 120
            characters.


            The TPP ID value will match the organization ID value from the Trust Framework, and therefore will be a v4 UUID.


            The Merchant ID wil be as per the existing Aani Core rules for the Merchant identification, and will incorporate
            the Trade License number for the Merchant.


            A BIC is specific according to the standard format for ISO 20022, and can therefore be either 8 or 11 characters
            in length.


            If the value of the concatenated string exceeds 120 characters, the TPP must omit or truncate the freeform
            element of the reference.
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^TPP=[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12},(Merchant=[A-Z0-9]{3}-[A-Z]{4}-TL.+-[0-9]{4}|),BIC=[A-Z0-9]{4}[A-Z0-9]{2}[A-Z0-9]{2}([A-Z0-9]{3}){0,1}($|,.+$)
          deprecated: true
        - description: |-
            A Debtor Reference is a note is for the reference of a given User that may be available as
            additional information in relation to a given payment instruction.
          type: string
          minLength: 1
          maxLength: 35
    AEServiceInitiationConsentControlParameters:
      type: object
      properties:
        IsDelegatedAuthentication:
          type: boolean
          description: >-
            Indicates whether the all payment controls will be defined and managed by the TPP under the Payment with
            Delegated Authentication capability
        ConsentSchedule:
          $ref: '#/components/schemas/AEServiceInitiationConsentSchedule'
      description: Control Parameters set the overall rules for the Payment Schedule
      additionalProperties: false
    AEServiceInitiationConsentSchedule:
      type: object
      properties:
        SinglePayment:
          $ref: '#/components/schemas/AEServiceInitiationSinglePayment'
        MultiPayment:
          $ref: '#/components/schemas/AEServiceInitiationLongLivedPaymentConsent'
        FilePayment:
          $ref: '#/components/schemas/AEServiceInitiationFilePaymentConsent'
      description: |2-
            The various payment types that can be initiated:
            * A Single Payment
            * A Multi-Payment
            * A Combined Payment (one SinglePayment and one MultiPayment)
      additionalProperties: false
    AEServiceInitiationFilePaymentConsent:
      type: object
      required:
        - FileType
        - FileHash
        - NumberOfTransactions
        - ControlSum
      properties:
        FileType:
          type: string
          minLength: 1
          maxLength: 40
          description: Specifies the payment file type
        FileHash:
          type: string
          minLength: 1
          maxLength: 44
          description: A base64 encoding of a SHA256 hash of the file to be uploaded.
        FileReference:
          $ref: '#/components/schemas/AEServiceInitiationReference'
        NumberOfTransactions:
          type: integer
          description: Number of individual transactions contained in the payment information group.
        ControlSum:
          type: string
          pattern: ^\d{1,16}\.\d{2}$
          description: Total of all individual amounts included in the group, irrespective of currencies.
        RequestedExecutionDate:
          $ref: '#/components/schemas/AERequestedExecutionDate'
      description: A Consent definition for defining Bulk/Batch Payments
      additionalProperties: false
    AEServiceInitiationReference:
      type: string
      minLength: 1
      maxLength: 35
      description: A reason or reference in relation to a payment.
    AEServiceInitiationLongLivedPaymentConsent:
      type: object
      required:
        - PeriodicSchedule
      properties:
        MaximumCumulativeValueOfPayments:
          allOf:
            - $ref: '#/components/schemas/AEAmountAndCurrency'
          description: |2-
                The maximum cumulative value of all successful payment rails executions under the Consent.
                Each successful payment rails execution amount (related to the Consent) is added to the total cumulative value of the Consent which cannot exceed the maximum value agreed with the User at the point of consent.
        MaximumCumulativeNumberOfPayments:
          type: integer
          description: |2-
                The maximum cumulative number of all successful payment rails executions under the Consent.
                Each successful payment rails execution (related to the Consent) is added to the total cumulative number of payments for the Consent which cannot exceed the maximum value agreed with the User at the point of consent.
        PeriodicSchedule:
          $ref: '#/components/schemas/AEServiceInitiationLongLivedPaymentConsentPeriodicSchedule'
      description: A Consent definition for defining Multi Payments
      additionalProperties: false
    AEServiceInitiationLongLivedPaymentConsentPeriodicSchedule:
      oneOf:
        - $ref: '#/components/schemas/AEServiceInitiationFixedDefinedSchedule'
        - $ref: '#/components/schemas/AEServiceInitiationVariableDefinedSchedule'
        - $ref: '#/components/schemas/AEServiceInitiationFixedPeriodicSchedule'
        - $ref: '#/components/schemas/AEServiceInitiationVariablePeriodicSchedule'
        - $ref: '#/components/schemas/AEServiceInitiationFixedOnDemand'
        - $ref: '#/components/schemas/AEServiceInitiationVariableOnDemand'
      discriminator:
        propertyName: Type
      description: The definition for a schedule
      additionalProperties: false
    AEServiceInitiationVariablePeriodicSchedule:
      type: object
      required:
        - Type
        - PeriodType
        - PeriodStartDate
        - MaximumIndividualAmount
      properties:
        Type:
          type: string
          enum:
            - VariablePeriodicSchedule
        PeriodType:
          $ref: '#/components/schemas/AEPeriodType'
        PeriodStartDate:
          $ref: '#/components/schemas/AEPeriodStartDate'
        MaximumIndividualAmount:
          allOf:
            - $ref: '#/components/schemas/AEAmountAndCurrency'
          description: This is the Maximum amount a variable payment can take per period.
      description: >-
        Payment Controls that apply to all payment instructions in a given period under this payment consent. The
        payments for this consent must be executed only on the PeriodStartDate, and dates recurring based on the
        PeriodType.
      additionalProperties: false
    AEServiceInitiationFixedDefinedSchedule:
      type: object
      required:
        - Type
        - Schedule
      properties:
        Type:
          type: string
          enum:
            - FixedDefinedSchedule
          description: The Periodic Schedule Type
        Schedule:
          type: array
          items:
            $ref: '#/components/schemas/AEServiceInitiationFixedSchedule'
          minItems: 1
          maxItems: 53
      description: Payment Schedule denoting a list of pre-defined future dated payments all with fixed amounts and dates.
      additionalProperties: false
    AEServiceInitiationVariableDefinedSchedule:
      type: object
      required:
        - Type
        - Schedule
      properties:
        Type:
          type: string
          enum:
            - VariableDefinedSchedule
          description: The Periodic Schedule Type
        Schedule:
          type: array
          items:
            $ref: '#/components/schemas/AEServiceInitiationVariableSchedule'
          minItems: 1
          maxItems: 53
      description: Payment Schedule denoting a list of pre-defined future dated payments all with variable amounts and dates.
      additionalProperties: false
    AEServiceInitiationFixedPeriodicSchedule:
      type: object
      required:
        - Type
        - PeriodType
        - PeriodStartDate
        - Amount
      properties:
        Type:
          type: string
          enum:
            - FixedPeriodicSchedule
        PeriodType:
          $ref: '#/components/schemas/AEPeriodType'
        PeriodStartDate:
          $ref: '#/components/schemas/AEPeriodStartDate'
        Amount:
          $ref: '#/components/schemas/AEAmountAndCurrency'
      description: >-
        Payment Controls that apply to all payment instructions in a given period under this payment consent. The
        payments for this consent must be executed only on the PeriodStartDate, and dates recurring based on the
        PeriodType.
      additionalProperties: false
    AEServiceInitiationFixedOnDemand:
      type: object
      required:
        - Type
        - PeriodType
        - PeriodStartDate
        - Amount
        - Controls
      properties:
        Type:
          type: string
          enum:
            - FixedOnDemand
        PeriodType:
          $ref: '#/components/schemas/AEPeriodType'
        PeriodStartDate:
          $ref: '#/components/schemas/AEPeriodStartDate'
        Amount:
          $ref: '#/components/schemas/AEAmountAndCurrency'
        Controls:
          type: object
          minProperties: 1
          additionalProperties: false
          properties:
            MaximumCumulativeValueOfPaymentsPerPeriod:
              allOf:
                - $ref: '#/components/schemas/AEAmountAndCurrency'
              description: The maximum cumulative payment value of all payment initiations per Period Type.
            MaximumCumulativeNumberOfPaymentsPerPeriod:
              type: integer
              description: The maximum frequency of payment initiations per Period Type.
      description: >-
        Payment Controls that apply to all payment instructions in a given period under this payment consent. The
        payments for this consent may be executed on any date, as long as they are within the Controls for a PeriodType
      additionalProperties: false
    AEServiceInitiationVariableOnDemand:
      type: object
      required:
        - Type
        - PeriodType
        - PeriodStartDate
        - Controls
      properties:
        Type:
          type: string
          enum:
            - VariableOnDemand
        PeriodType:
          $ref: '#/components/schemas/AEPeriodType'
        PeriodStartDate:
          $ref: '#/components/schemas/AEPeriodStartDate'
        Controls:
          type: object
          minProperties: 1
          additionalProperties: false
          properties:
            MaximumIndividualAmount:
              allOf:
                - $ref: '#/components/schemas/AEAmountAndCurrency'
              description: This is the Maximum amount a variable payment can take per period.
            MaximumCumulativeValueOfPaymentsPerPeriod:
              allOf:
                - $ref: '#/components/schemas/AEAmountAndCurrency'
              description: The maximum cumulative payment value of all payment initiations per Period Type.
            MaximumCumulativeNumberOfPaymentsPerPeriod:
              type: integer
              description: The maximum frequency of payment initiations per Period Type.
      description: >-
        Payment Controls that apply to all payment instructions in a given period under this payment consent. The
        payments for this consent may be executed on any date, as long as they are within the Controls for a PeriodType
      additionalProperties: false
    AEServiceInitiationFixedSchedule:
      type: object
      required:
        - PaymentExecutionDate
        - Amount
      properties:
        PaymentExecutionDate:
          type: string
          format: date
          description: |2-
                Used to specify the expected payment execution date/time.
                All dates in the JSON payloads are represented in ISO 8601 date format.
                An example is: 2023-04-05
        Amount:
          $ref: '#/components/schemas/AEAmountAndCurrency'
      additionalProperties: false
    AEServiceInitiationVariableSchedule:
      type: object
      required:
        - PaymentExecutionDate
        - MaximumIndividualAmount
      properties:
        PaymentExecutionDate:
          type: string
          format: date
          description: >-
            Used to specify the expected payment execution date/time. All dates in the JSON payloads are represented in
            ISO 8601 date format. An example is: 2023-04-05
        MaximumIndividualAmount:
          allOf:
            - $ref: '#/components/schemas/AEAmountAndCurrency'
          description: This is the Maximum amount a variable payment can take per period.
      additionalProperties: false
    AEServiceInitiationSinglePayment:
      anyOf:
        - $ref: '#/components/schemas/AEServiceInitiationSingleInstantPayment'
        - $ref: '#/components/schemas/AEServiceInitiationFutureDatedPayment'
      discriminator:
        propertyName: Type
        mapping:
          SingleInstantPayment: '#/components/schemas/AEServiceInitiationSingleInstantPayment'
          SingleFutureDatedPayment: '#/components/schemas/AEServiceInitiationFutureDatedPayment'
      description: A Consent definition for defining Single Payments
    AEServiceInitiationFutureDatedPayment:
      type: object
      required:
        - Type
        - Amount
        - RequestedExecutionDate
      properties:
        Type:
          type: string
          enum:
            - SingleFutureDatedPayment
        Amount:
          $ref: '#/components/schemas/AEAmountAndCurrency'
        RequestedExecutionDate:
          $ref: '#/components/schemas/AERequestedExecutionDate'
      description: >-
        A single payment consent that MUST be used for a single payment executed by the LFI on a future date. This
        payment consent will be authorized by the User during the payment journey, and the payment will be executed by
        the TPP immediately.

        **Support for Single Future-Dated Payments warehoused at the LFI is removed from v2.1 of the standards.**
        **This property is therefore deprecated, and the Schema Object is retained to provide compatibility with**
        **existing consent resources.**
      additionalProperties: false
      deprecated: true
    AEServiceInitiationSingleInstantPayment:
      type: object
      required:
        - Type
        - Amount
      properties:
        Type:
          type: string
          enum:
            - SingleInstantPayment
          description: The Payment Type
        Amount:
          $ref: '#/components/schemas/AEAmountAndCurrency'
      description: >-
        A single immediate payment consent that MUST be used for a single payment which will be initiated immediately
        after User authorization at the LFI.
      additionalProperties: false
    AEAmountAndCurrency:
      type: object
      required:
        - Currency
        - Amount
      properties:
        Currency:
          $ref: '#/components/schemas/CurrencyCode'
        Amount:
          $ref: '#/components/schemas/Amount'
      description: The Currency and Amount relating to the Payment
      additionalProperties: false
    Amount:
      description: >-
        A number of monetary units specified in an active currency where the unit of currency is explicit and compliant
        with ISO 4217.
      type: string
      pattern: ^\d{1,16}\.\d{2}$
    CurrencyCode:
      description: >-
        A 3 character alphabetic code allocated to a currency under an international currency identification scheme, as
        described in the latest edition of the international standard ISO 4217 'Codes for the representation of
        currencies and funds'.
      type: string
      pattern: ^[A-Z]{3}$
    IsSingleAuthorization:
      description: |
        Specifies to the LFI that the consent authorization must be completed in a single authorization Step
        with the LFI
      type: boolean
    AEServiceInitiationConsentPermissionCodes:
      type: string
      enum:
        - ReadAccountsBasic
        - ReadAccountsDetail
        - ReadBalances
        - ReadRefundAccount
    AEJWEPaymentPII:
      type: string
      description: |
        A JSON Web Encryption (JWE) object, which encapsulates a JWS. The value is a
        compact serialization of a JWE, which is a string consisting of five
        base64url-encoded parts joined by dots. It encapsulates encrypted content
        using JSON data structures.

        The decrypted JWS content has the structure of the AEPaymentPII schema.
      example: eyJhbGciOiJSU0EtT0FFUCIsImVuYyI6IkEyNTZHQ00ifQ....
    AEPaymentConsentPII:
      title: Payment Initiation PII, to v2.0
      type: object
      additionalProperties: false
      deprecated: true
      description: >
        Elements of Personal Identifiable Information data.

        **PII up to v2.0. Deprecated at v2.1 for description split by Domestic and International payments.**
      properties:
        Initiation:
          type: object
          additionalProperties: false
          description: >-
            The Initiation payload is sent by the initiating party to the LFI. It is used to request movement of funds
            from the debtor account to a creditor.
          properties:
            DebtorAccount:
              type: object
              additionalProperties: false
              required:
                - SchemeName
                - Identification
              description: >-
                Unambiguous identification of the account of the debtor to which a debit entry will be made as a result
                of the transaction.
              properties:
                SchemeName:
                  description: Name of the identification scheme, in a coded form as published in an external list.
                  type: string
                  enum:
                    - IBAN
                Identification:
                  description: |
                    Identification for the account assigned by the LFI based on the Account Scheme Name.
                    This identification is known by the User account owner.
                  type: string
                  minLength: 1
                Name:
                  type: object
                  description: >
                    The Account Holder Name is the name or names of the Account owner(s) represented at the account
                    level
                  properties:
                    en:
                      type: string
                      description: English value of the string
                      maxLength: 70
                    ar:
                      type: string
                      description: Arabic value of the string
                      maxLength: 70
                  additionalProperties: false
            Creditor:
              description: |
                (Array) Identification elements for a Creditor associated with the consent
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/AECreditor'
        Risk:
          $ref: '#/components/schemas/AERisk'
    AECreditor:
      additionalProperties: false
      type: object
      description: Identification elements for a Creditor.
      properties:
        CreditorAgent:
          description: |
            Refers to the Financial Institution.
          type: object
          required:
            - SchemeName
            - Identification
          properties:
            SchemeName:
              description: |
               The identification scheme for uniquely identifying the Agent.

                * BICFI: The BIC/SWIFT Code
                * Other: Identifier based on non-SWIFT payment system or local market scheme.
              type: string
              enum:
                - BICFI
                - Other
            Identification:
              description: Identifier that can be the BIC/SWIFT code or target payment scheme identifier.
              type: string
            Name:
              description: Name by which an agent is known and which is usually used to identify that agent.
              type: string
              minLength: 1
              maxLength: 140
            PostalAddress:
              $ref: '#/components/schemas/AEAddress'
        Creditor:
          type: object
          additionalProperties: false
          description: Party to which an amount of money is due.
          properties:
            Name:
              description: |
                Name by which a party is known and which is usually used to identify that party.
                This may be used to identify the Creditor for international payments.
              type: string
              minLength: 1
              maxLength: 140
            PostalAddress:
              $ref: '#/components/schemas/AEAddress'
        CreditorAccount:
          description: Unambiguous identification of the account of the creditor to which a credit entry will be posted.
          type: object
          additionalProperties: false
          required:
            - SchemeName
            - Identification
            - Name
          properties:
            SchemeName:
              $ref: '#/components/schemas/AECreditorExternalAccountIdentificationCode'
            Identification:
              $ref: '#/components/schemas/AEIdentification'
            Name:
              $ref: '#/components/schemas/AEName'
            TradingName:
              $ref: '#/components/schemas/AETradingName'
        ConfirmationOfPayeeResponse:
          $ref: '#/components/schemas/AEConfirmationOfPayeeResponse'
    AEDebtorIndicators:
      type: object
      description: |
        Debtor (User) Indicators
      properties:
        Authentication:
          type: object
          description: The authentication method used by the User to access their account with the TPP
          properties:
            AuthenticationChannel:
              description: Channel on which the User was authenticated
              type: string
              enum:
                - App
                - Web
            PossessionFactor:
              type: object
              description: The User's possession, that only the User possesses
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - FIDO2SecurityKey
                    - Passkey
                    - OTPDevice
                    - OTPApp
                    - SMSOTP
                    - EmailOTP
                    - PushNotification
                    - WebauthnToken
                    - SecureEnclaveKey
                    - HardwareOTPKey
                    - TrustedDevice
                    - Other
              additionalProperties: false
            KnowledgeFactor:
              type: object
              description: The User's knowledge, that only the User knows
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - PIN
                    - Password
                    - SecurityQuestion
                    - SMSOTP
                    - EmailOTP
                    - OTPPush
                    - Other
              additionalProperties: false
            InherenceFactor:
              type: object
              description: The User's inherance, that is unique to the User's physical characteristics
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - Biometric
                    - Fingerprint
                    - FaceRecognition
                    - IrisScan
                    - VoiceRecognition
                    - FIDOBiometric
                    - DeviceBiometrics
                    - Other
              additionalProperties: false
            ChallengeOutcome:
              type: string
              description: >-
                The result of multi-factor authentication performed by the TPP, with NotPerformed indication the User
                was not required to authenticate before consenting to the requested payment
              enum:
                - Pass
                - Fail
                - NotPerformed
            AuthenticationFlow:
              type: string
              enum:
                - MFA
                - Other
            AuthenticationValue:
              type: string
              description: Cryptographic proof of authentication where supported by the device and protocol.
            ChallengeDateTime:
              type: string
              format: date-time
          additionalProperties: false
        UserName:
          type: object
          description: The Name of the User initiating the Payment
          properties:
            en:
              type: string
              description: English value of the string
            ar:
              type: string
              description: Arabic value of the string
          additionalProperties: false
        GeoLocation:
          type: object
          description: GPS to identify and track the whereabouts of the connected electronic device.
          required:
            - Latitude
            - Longitude
          properties:
            Latitude:
              type: string
              description: latitude
            Longitude:
              type: string
              description: longitude
          additionalProperties: false
        DeviceInformation:
          type: object
          description: Detailed device information
          properties:
            DeviceId:
              type: string
              description: IMEISV number of the connected electronic device
            AlternativeDeviceId:
              type: string
              description: Alternative identifier for the connected electronic device
            DeviceOperatingSystem:
              type: string
              description: Device operating system
            DeviceOperatingSystemVersion:
              type: string
              description: Device operating system version
            DeviceBindingId:
              type: string
              description: An identifier that associates a device uniquely with a specific application
            LastBindingDateTime:
              type: string
              format: date-time
              description: Date and time when the device was last bound to the application
            BindingDuration:
              type: string
              format: duration
              description: ISO 8601 duration since device was last bound (e.g., P30D for 30 days)
            BindingStatus:
              type: string
              description: Current status of the device binding
              enum:
                - Active
                - Expired
                - Revoked
                - Suspended
            DeviceType:
              type: string
              description: Type of device used
              enum:
                - Mobile
                - Desktop
                - Tablet
                - Wearable
                - Other
            DeviceManufacturer:
              type: object
              properties:
                Model:
                  type: string
                  description: Device model name
                  maxLength: 50
                Manufacturer:
                  type: string
                  description: Device manufacturer
                  maxLength: 50
              additionalProperties: false
            DeviceLanguage:
              type: string
              description: Device language
            DeviceLocalDateTime:
              type: string
              description: Device local time
            ConnectionType:
              type: string
              description: Type of connection to the internet
              enum:
                - WiFi
                - Cellular
                - Other
            ScreenInformation:
              type: object
              properties:
                PixelDensity:
                  type: number
                  description: Screen pixel density
                Orientation:
                  type: string
                  enum:
                    - Portrait
                    - Landscape
              additionalProperties: false
            BatteryStatus:
              type: object
              properties:
                Level:
                  type: number
                  minimum: 0
                  maximum: 100
                IsCharging:
                  type: boolean
              additionalProperties: false
            TouchSupport:
              type: object
              properties:
                Supported:
                  type: boolean
                MaxTouchPoints:
                  type: integer
                  minimum: 0
              additionalProperties: false
            MotionSensors:
              type: object
              properties:
                Status:
                  type: string
                  enum:
                    - InMotion
                    - Stationary
                Accelerometer:
                  type: boolean
                Gyroscope:
                  type: boolean
              additionalProperties: false
            DeviceEnvironmentContext:
              type: array
              description: List of device environment context
              items:
                type: string
                enum:
                  - VPNDetected
                  - EmulatorDetected
          additionalProperties: false
        BiometricCapabilities:
          type: object
          description: Device biometric capabilities
          properties:
            SupportsBiometric:
              type: boolean
              description: Whether device supports biometric authentication
            BiometricTypes:
              type: array
              description: Types of biometric authentication supported
              items:
                type: string
                enum:
                  - Fingerprint
                  - FacialRecognition
                  - Iris
                  - VoicePrint
                  - Other
          additionalProperties: false
        AppInformation:
          type: object
          description: Mobile application specific information
          properties:
            AppVersion:
              type: string
              description: Version of the mobile application
            PackageName:
              type: string
              description: Application package identifier
            BuildNumber:
              type: string
              description: Application build number
          additionalProperties: false
        BrowserInformation:
          type: object
          description: Browser-specific information
          properties:
            UserAgent:
              type: string
              description: Complete browser user agent string
            IsCookiesEnabled:
              type: boolean
              description: Whether cookies are enabled in the browser
            AvailableFonts:
              type: array
              description: List of available fonts
              items:
                type: string
            Plugins:
              type: array
              description: List of installed browser plugins
              items:
                type: string
            PixelRatio:
              type: number
              description: Device pixel ratio for scaling
          additionalProperties: false
        UserBehavior:
          type: object
          description: User behavior indicators
          properties:
            ScrollBehavior:
              type: object
              properties:
                Direction:
                  type: string
                  enum:
                    - Up
                    - Down
                    - Both
                Speed:
                  type: number
                  description: Average scroll speed in pixels per second
                Frequency:
                  type: number
                  description: Number of scroll events per minute
              additionalProperties: false
          additionalProperties: false
        AccountRiskIndicators:
          type: object
          description: Risk indicators related to the account
          properties:
            UserOnboardingDateTime:
              type: string
              format: date-time
              description: The exact date and time when the User account was activated with the TPP.
            LastAccountChangeDate:
              type: string
              format: date
              description: Date that the User's account was last changed
            LastPasswordChangeDate:
              type: string
              format: date
              description: Date of the last password change by the User
            SuspiciousActivity:
              type: string
              description: Indicates any suspicious activity associated with the account
              enum:
                - NoSuspiciousActivity
                - SuspiciousActivityDetected
            TransactionHistory:
              type: object
              properties:
                LastDay:
                  type: integer
                  description: Total transactions made by the account in the last 24 hours
                  minimum: 0
                LastYear:
                  type: integer
                  description: Total transactions made by the account in the past year
                  minimum: 0
              additionalProperties: false
          additionalProperties: false
        SupplementaryData:
          type: object
          description: >
            Additional information that cannot be captured in the structured fields and/or any other specific block

            This may include information that is not available in the structured fields, such as a user's behavioural
            data

            like their typing speed and typing patterns.
      additionalProperties: false
    AERisk:
      additionalProperties: false
      description: >
        The Risk section is sent by the TPP to the LFI. It is used to specify additional details for risk/fraud scoring
        regarding Payments.
      type: object
      properties:
        DebtorIndicators:
          $ref: '#/components/schemas/AEDebtorIndicators'
        DestinationDeliveryAddress:
          type: object
          description: |
            Destination Delivery Address
          properties:
            RecipientType:
              type: string
              description: The recipient of the goods whether an individual or a corporation.
              enum:
                - Individual
                - Corporate
            RecipientName:
              type: object
              description: The name of the recipient of the goods, whether an individual or a corporation.
              properties:
                en:
                  type: string
                  description: English value of the string
                ar:
                  type: string
                  description: Arabic value of the string
              additionalProperties: false
            NationalAddress:
              $ref: '#/components/schemas/AEAddress'
          additionalProperties: false
        TransactionIndicators:
          $ref: '#/components/schemas/AETransactionIndicators'
        CreditorIndicators:
          $ref: '#/components/schemas/AECreditorIndicators'
    AETransactionIndicators:
      type: object
      description: |
        Transaction Indicators
      properties:
        IsCustomerPresent:
          description: This field differentiates between automatic and manual payment initiation.
          type: boolean
        IsContractPresent:
          description: Indicates if the Creditor has a contractual relationship with the TPP.
          type: boolean
        Channel:
          description: Where the payment has been initiated from.
          type: string
          enum:
            - Web
            - Mobile
        ChannelType:
          type: string
          description: The channel through which the transaction is being conducted
          enum:
            - ECommerce
            - InStore
            - InApp
            - Telephone
            - Mail
            - RecurringPayment
            - Other
        SubChannelType:
          type: string
          description: More specific classification of the transaction channel
          enum:
            - WebBrowser
            - MobileApp
            - SmartTV
            - WearableDevice
            - POSTerminal
            - ATM
            - KioskTerminal
            - Other
        PaymentProcess:
          type: object
          description: Metrics related to the payment process duration and attempts
          properties:
            TotalDuration:
              type: integer
              description: Total time in seconds from payment initiation to completion
              minimum: 0
            CurrentSessionAttempts:
              type: integer
              description: Number of payment attempts in the current session
              minimum: 1
            CurrentSessionFailedAttempts:
              type: integer
              description: Number of failed payment attempts in the current session
              minimum: 0
            Last24HourAttempts:
              type: integer
              description: Number of payment attempts in the last 24 hours
              minimum: 0
            Last24HourFailedAttempts:
              type: integer
              description: Number of failed payment attempts in the last 24 hours
              minimum: 0
          additionalProperties: false
        MerchantRisk:
          type: object
          description: Risk indicator details provided by the merchant
          properties:
            DeliveryTimeframe:
              type: string
              description: Timeframe for the delivery of purchased items
              enum:
                - ElectronicDelivery
                - SameDayShipping
                - OvernightShipping
                - MoreThan1DayShipping
            ReorderItemsIndicator:
              type: string
              description: Indicates if the transaction is a reorder
              enum:
                - FirstTimeOrder
                - Reorder
            PreOrderPurchaseIndicator:
              type: string
              description: Indicates if this is a pre-ordered item
              enum:
                - MerchandiseAvailable
                - FutureAvailability
            IsGiftCardPurchase:
              type: boolean
              description: Indicates if the transaction includes a gift card
            IsDeliveryAddressMatchesBilling:
              type: boolean
              description: Indicates if delivery address matches billing address
            AddressMatchLevel:
              type: string
              description: Level of match between delivery and billing addresses
              enum:
                - FullMatch
                - PartialMatch
                - NoMatch
                - NotApplicable
          additionalProperties: false
        SupplementaryData:
          type: object
          description: |
            Additional information that cannot be captured in the structured fields and/or any other specific block
      additionalProperties: false
    AECreditorIndicators:
      type: object
      description: |
        Creditor Indicators
      properties:
        AccountType:
          $ref: '#/components/schemas/AEAccountTypeCode'
        IsCreditorPrePopulated:
          $ref: '#/components/schemas/AEIsCreditorPrePopulated'
        TradingName:
          $ref: '#/components/schemas/AETradingName'
        IsVerifiedByTPP:
          $ref: '#/components/schemas/AEIsVerifiedbyTPP'
        AdditionalAccountHolderIdentifiers:
          $ref: '#/components/schemas/AEAdditionalAccountHolderIdentifiers'
        MerchantDetails:
          type: object
          description: >
            Details of the Merchant involved in the transaction.

            Merchant Details are specified only for those merchant categories that are generally expected to originate
            retail financial transactions
          properties:
            MerchantId:
              description: MerchantId
              type: string
              minLength: 8
              maxLength: 20
            MerchantName:
              description: Name by which the merchant is known.
              type: string
              minLength: 1
              maxLength: 350
            MerchantSICCode:
              description: >
                SIC code stands for standard industrial classification (SIC) code.

                This four digit-number identifies a very specific short descriptor of the type of business a company is
                engaged in.

                SIC can be obtained from the Chamber of Commerce.
              type: string
              minLength: 3
              maxLength: 4
            MerchantCategoryCode:
              description: >
                Category code values are used to enable the classification of merchants into specific categories based
                on the type of business, trade or services supplied.

                Category code conforms to ISO 18245, related to the type of services or goods the merchant provides for
                the transaction."
              type: string
              minLength: 3
              maxLength: 4
          additionalProperties: false
        IsCreditorConfirmed:
          description: Creditor account details have been confirmed successfully using Confirmation of Payee
          type: boolean
        ConfirmationOfPayeeResponse:
          $ref: '#/components/schemas/AEConfirmationOfPayeeResponse'
        SupplementaryData:
          type: object
          description: |
            Additional information that cannot be captured in the structured fields and/or any other specific block
      additionalProperties: false
    AEIsCreditorPrePopulated:
      description: Is Creditor populated
      type: boolean
    AEIsVerifiedbyTPP:
      description: The TPP has onboarded the Creditor
      type: boolean
    AEAdditionalAccountHolderIdentifiers:
      type: array
      items:
        type: object
        description: Provides the details to identify an account.
        required:
          - SchemeName
          - Identification
        properties:
          SchemeName:
            $ref: '#/components/schemas/AERiskExternalAccountIdentificationCode'
          Identification:
            $ref: '#/components/schemas/AEIdentification'
          Name:
            $ref: '#/components/schemas/AEName'
        additionalProperties: false
    AERiskExternalAccountIdentificationCode:
      description: Name of the identification scheme, in a coded form as published in an external list.
      type: string
      enum:
        - EmiratesID
        - TradeLicenceNumber
    AEConfirmationOfPayeeResponse:
      description: >-
        The JSON Web Signature returned by the Payee Confirmation operation at the Confirmation of Payee API. The value
        must be the full JWS string, including the header and signature, without decoding to an object. If Confirmation
        of Payee is not performed this property can be omitted
      type: string
      pattern: ^.+\..+\..+$
    AEAddress:
      anyOf:
        - description: >
            (Array) Address information that locates and identifes a specific address, as defined by a national or
            international postal service."

            **v1.2 version of address format marked as deprecated, replaced at v2.0**
          type: array
          minItems: 1
          items:
            type: object
            required:
              - AddressType
              - Country
            properties:
              AddressType:
                $ref: '#/components/schemas/AEAddressTypeCode'
              ShortAddress:
                $ref: '#/components/schemas/AEShortAddress'
              UnitNumber:
                $ref: '#/components/schemas/AEUnitNumber'
              FloorNumber:
                $ref: '#/components/schemas/AEFloorNumber'
              BuildingNumber:
                $ref: '#/components/schemas/AEBuildingNumber'
              StreetName:
                $ref: '#/components/schemas/AEStreetName'
              SecondaryNumber:
                $ref: '#/components/schemas/AESecondaryNumber'
              District:
                $ref: '#/components/schemas/AEDistrict'
              PostalCode:
                $ref: '#/components/schemas/AEPostalCode'
              POBox:
                $ref: '#/components/schemas/AEPOBox'
              ZipCode:
                $ref: '#/components/schemas/AEZipCode'
              City:
                $ref: '#/components/schemas/AECity'
              Region:
                $ref: '#/components/schemas/AERegion'
              Country:
                $ref: '#/components/schemas/AECountryCode'
            additionalProperties: false
        - type: array
          items:
            type: object
            properties:
              AddressType:
                type: string
                enum:
                  - Billing
                  - Business
                  - Correspondence
                  - DeliveryTo
                  - MailTo
                  - POBox
                  - Postal
                  - Permanent
                  - Residential
                  - Statement
                  - Other
              AddressLine:
                type: array
                items:
                  type: string
                  minLength: 1
                  maxLength: 70
                minItems: 1
                maxItems: 7
              BuildingNumber:
                type: string
                minLength: 1
                maxLength: 16
              BuildingName:
                type: string
                minLength: 1
                maxLength: 140
              Floor:
                type: string
                minLength: 1
                maxLength: 70
              StreetName:
                type: string
                minLength: 1
                maxLength: 140
              DistrictName:
                type: string
                minLength: 1
                maxLength: 140
              PostBox:
                type: string
                minLength: 1
                maxLength: 16
              TownName:
                type: string
                minLength: 1
                maxLength: 140
              CountrySubDivision:
                anyOf:
                  - type: string
                    enum:
                      - AbuDhabi
                      - Ajman
                      - Dubai
                      - Fujairah
                      - RasAlKhaimah
                      - Sharjah
                      - UmmAlQuwain
                  - type: string
              Country:
                type: string
                pattern: ^[A-Z]{2}$
            required:
              - AddressType
              - AddressLine
              - Country
            additionalProperties: false
          minItems: 1
          description: One-or-more addresses related to a given subject.
    AEAddressTypeCode:
      description: Specifies the nature of the Address.
      type: string
      enum:
        - Business
        - Correspondence
        - Residential
      example: Residential
    AEShortAddress:
      description: >-
        A short address consists of four letters: region code, branch code, division code, unique code and a four-digit
        number for the building.
      type: string
      minLength: 1
      maxLength: 8
      example: ABCD1234
    AEUnitNumber:
      description: Identifies the unit or apartment number.
      type: string
      minLength: 1
      maxLength: 10
      example: '6'
    AEFloorNumber:
      description: Identifies the building floor number.
      type: string
      minLength: 1
      maxLength: 10
      example: '2'
    AEBuildingNumber:
      description: Identifies the building number.
      type: string
      minLength: 1
      maxLength: 10
      example: '34'
    AEStreetName:
      description: Identifies the street name or road.
      type: string
      minLength: 1
      maxLength: 70
      example: Omar Bin Hassan Street
    AEDistrict:
      description: Identifies the district of a city.
      type: string
      minLength: 1
      maxLength: 35
      example: Olaya Dist.
    AECountryCode:
      description: Indicates the country code in which the address is located (References ISO 3166-1 alpha-2).
      type: string
      pattern: ^[A-Z]{2,2}$
      example: SA
    AEPostalCode:
      description: ' Identifies the postal code; a unique code assigned to a specific geographic area for efficient mail sorting and delivery purposes.'
      type: string
      minLength: 1
      maxLength: 10
      example: '12345'
    AEPOBox:
      description: ' Identifies the POBox.'
      type: string
      minLength: 1
      maxLength: 10
      example: '11562'
    AEZipCode:
      description: >-
        Identifies the ZIP code; a unique code assigned to a specific geographic area for efficient mail sorting and
        delivery purposes.
      type: string
      minLength: 1
      maxLength: 10
      example: '12366'
    AESecondaryNumber:
      description: 4 numbers representing the accurate location coordinates of the address
      type: string
      minLength: 4
      maxLength: 4
      example: '1233'
    AECity:
      description: Identifies the name of the city or town where the address is situated.
      type: string
      minLength: 1
      maxLength: 35
      example: Riyadh
    AERegion:
      description: Identifies the region.
      type: string
      minLength: 1
      maxLength: 35
      example: North
    AECreditorExternalAccountIdentificationCode:
      description: Name of the identification scheme, in a coded form as published in an external list.
      type: string
      enum:
        - IBAN
        - AccountNumber
    AEIdentification:
      description: |
        Identification for the account assigned by the LFI based on the Account Scheme Name.
        This identification is known by the User account owner.
      type: string
      minLength: 1
    AEName:
      type: object
      description: |
        The Account Holder Name is the name or names of the Account owner(s) represented at the account level
      properties:
        en:
          type: string
          description: English value of the string
          maxLength: 70
        ar:
          type: string
          description: Arabic value of the string
          maxLength: 70
      additionalProperties: false
    AETradingName:
      type: object
      description: |
        The Trading Brand Name (if applicable) for the Creditor.
        Applicable to Payments.
      properties:
        en:
          type: string
          description: English value of the string
          maxLength: 70
        ar:
          type: string
          description: Arabic value of the string
          maxLength: 70
      additionalProperties: false
    AuthorizationDetailsDataSharingConsent:
      type: object
      required:
        - ConsentId
        - Permissions
        - OpenFinanceBilling
        - ExpirationDateTime
      properties:
        ConsentId:
          $ref: '#/components/schemas/AEConsentId'
        Permissions:
          type: array
          items:
            $ref: '#/components/schemas/AEAccountAccessConsentPermissionCodes'
          minItems: 1
        OpenFinanceBilling:
          $ref: '#/components/schemas/AEAccountAccessOpenFinanceBillingPost'
      allOf:
        - $ref: '#/components/schemas/AEAccountAccessAuthorizationDetailsProperties'
      additionalProperties: false
    AuthorizationDetailsInsuranceConsent:
      type: object
      required:
        - ConsentId
        - Permissions
        - OpenFinanceBilling
        - ExpirationDateTime
      properties:
        BaseConsentId:
          type: string
          description: The original ConsentId assigned by the TPP
        ExpirationDateTime:
          type: string
          format: date-time
          description: >-
            Specified date and time the permissions will expire. All date-time fields in responses must include the
            timezone. An example is below: 2017-04-05T10:43:07+00:00
        OnBehalfOf:
          $ref: '#/components/schemas/OnBehalfOf'
        ConsentId:
          $ref: '#/components/schemas/AEConsentId'
        Permissions:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceConsentPermissions'
          minItems: 1
        OpenFinanceBilling:
          $ref: '#/components/schemas/AEInsuranceOpenFinanceBillingPost'
    AEAccountAccessAuthorizationDetailsProperties:
      type: object
      properties:
        BaseConsentId:
          $ref: '#/components/schemas/AEBaseConsentId'
        ExpirationDateTime:
          type: string
          format: date-time
          description: |-
            Specified date and time the permissions will expire.
            All date-time fields in responses must include the timezone. An example is below:
            2017-04-05T10:43:07+00:00
        TransactionFromDateTime:
          type: string
          format: date-time
          description: |2-
                Specified start date and time for the transaction query period.

                If this is not populated, the start date will be open ended, and
                data will be returned from the earliest available
                transaction.All dates in the JSON payloads are represented in
                ISO 8601 date-time format.

                All date-time fields in responses must include the timezone. An
                example is below:

                2017-04-05T10:43:07+00:00
                **DEPRECATED AT V2.1, REPLACED BY `FromDate`**
        TransactionToDateTime:
          type: string
          format: date-time
          description: |2-
                Specified end date and time for the transaction query period.

                If this is not populated, the end date will be open ended, and
                data will be returned to the latest available transaction.All
                dates in the JSON payloads are represented in ISO 8601 date-time
                format.

                All date-time fields in responses must include the timezone. An
                example is below:

                2017-04-05T10:43:07+00:00
                **DEPRECATED AT V2.1, REPLACED BY `ToDate`**
        FromDate:
          $ref: '#/components/schemas/AEBankDataSharingRichAuthorizationRequests.AEBankDataSharingFromDate'
        ToDate:
          $ref: '#/components/schemas/AEBankDataSharingRichAuthorizationRequests.AEBankDataSharingToDate'
        AccountType:
          type: array
          items:
            $ref: '#/components/schemas/AEExternalAccountTypeCode'
        AccountSubType:
          type: array
          items:
            $ref: '#/components/schemas/AEAccountSubTypeCode'
        OnBehalfOf:
          $ref: '#/components/schemas/AEOnBehalfOf'
      additionalProperties: false
    AEExternalAccountTypeCode:
      description: Specifies the type of account (Retail, SME or Corporate).
      type: string
      enum:
        - Retail
        - SME
        - Corporate
    OnBehalfOf:
      type: object
      description: On Behalf Of
      properties:
        TradingName:
          type: string
          description: Trading Name
          example: Acme Accounting Trading Name
        LegalName:
          type: string
          description: Legal Name
          example: Acme Accounting Legal Name
        IdentifierType:
          type: string
          description: Identifier Type
          enum:
            - Other
        Identifier:
          type: string
          description: Identifier
          example: abcd1234
      additionalProperties: false
    EventNotification:
      type: object
      description: |
        A Webhook Subscription Schema
      required:
        - Webhook
      properties:
        Webhook:
          description: |
            A Webhook Schema
          type: object
          required:
            - Url
            - IsActive
          properties:
            Url:
              description: |
                The TPP Callback URL being registered with the LFI
              type: string
              example: https://api.tpp.com/webhook/callbackUrl
            IsActive:
              description: >
                The TPP specifying whether the LFI should send (IsActive true) or not send (IsActive false) Webhook
                Notifications to the TPP's Webhook URL
              type: boolean
              example: false
          additionalProperties: false
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEDomesticPaymentPII:
      type: object
      properties:
        Initiation:
          type: object
          properties:
            DebtorAccount:
              $ref: >-
                #/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEBankServiceInitiationDebtorAccountProperties
            Creditor:
              type: array
              items:
                $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEDomesticCreditor'
              minItems: 1
              description: List of Creditors for a domestic payment consent.
          description: >-
            The Initiation payload is sent by the initiating party to the LFI. It is used to request movement of funds
            from the Debtor Account to a Creditor for one-or-more domestic payments.
          additionalProperties: false
        Risk:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AERisk'
      description: Elements of Personal Identifiable Information for a Domestic Payment.
      additionalProperties: false
      title: Domestic Payment PII Schema Object
    AEBankServiceInitiationRichAuthorizationRequests.AEBankServiceInitiationDebtorAccountProperties:
      type: object
      required:
        - SchemeName
        - Identification
      properties:
        SchemeName:
          type: string
          enum:
            - IBAN
          description: Scheme name for the Debtor Account. The Debtor Account must be an IBAN.
        Identification:
          type: string
          minLength: 1
          description: The Identification of the Debtor Account.
        Name:
          type: object
          properties:
            en:
              type: string
              maxLength: 70
            ar:
              type: string
              maxLength: 70
          minProperties: 1
          description: The Debtor Account, which can be provided in both English and Arabic. Omitted if not held by the TPP.
          additionalProperties: false
      description: >-
        Details of the Debtor Account when provided at the TPP. Omitted if not available at the TPP or the User chooses to
        select the Debtor Account at the LFI.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEDomesticCreditor:
      type: object
      required:
        - CreditorAccount
      properties:
        CreditorAgent:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorAgentProperties'
        Creditor:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorProperties'
        CreditorAccount:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEDomesticCreditorAccountProperties'
        ConfirmationOfPayeeResponse:
          type: string
          pattern: ^.+\..+\..+$
          description: |-
            Response from Confirmation of Payee operation, when executed for the Creditor Account.

            This is JSON Web Signature returned by the Payee Confirmation operation at the Confirmation of Payee API.

            The value must be the full JWS string, including the header and signature, without decoding to an object.

            If Confirmation of Payee is not performed this property can be omitted
      description: Identification elements for a Creditor for a domestic payment instruction.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AECreditorAgentProperties:
      type: object
      required:
        - SchemeName
        - Identification
      properties:
        SchemeName:
          type: string
          enum:
            - BICFI
            - Other
        Identification:
          type: string
        Name:
          type: string
          minLength: 1
          maxLength: 140
        PostalAddress:
          $ref: '#/components/schemas/AEAddress'
      description: >-
        Properties of the Creditor Agent, which provides information on the Financial Institution that holds the Creditor
        Account.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AECreditorProperties:
      type: object
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 140
        PostalAddress:
          $ref: '#/components/schemas/AEAddress'
      description: Party to which an amount of money is due.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEDomesticCreditorAccountProperties:
      type: object
      required:
        - SchemeName
        - Identification
        - Name
      properties:
        SchemeName:
          type: string
          enum:
            - IBAN
          description: Domestic payment scheme, restricted to `IBAN`
        Identification:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEIdentification'
        Name:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEName'
        TradingName:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AETradingName'
        Type:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorAccountTypeCodes'
      description: Unambiguous identification of the account of the creditor to which a credit entry will be posted.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEIdentification:
      type: string
      minLength: 1
      description: |-
        Identification for the account assigned by the LFI based on the Account Scheme Name.
        This identification is known by the User account owner.
    AEBankServiceInitiationRichAuthorizationRequests.AEName:
      type: object
      properties:
        en:
          type: string
          maxLength: 70
          description: English value of the string
        ar:
          type: string
          maxLength: 70
          description: Arabic value of the string
      description: The Account Holder Name is the name or names of the Account owner(s) represented at the account level
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AETradingName:
      type: object
      properties:
        en:
          type: string
          maxLength: 70
          description: English value of the string
        ar:
          type: string
          maxLength: 70
          description: Arabic value of the string
      description: |-
        The Trading Brand Name (if applicable) for the Creditor.
        Applicable to Payments.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AECreditorAccountTypeCodes:
      type: string
      enum:
        - Individual
        - Merchant
        - Business
        - Charity
        - GovernmentBody
        - Other
      description: >-
        The Creditor (Payee) Type, based on an allowed list. This value is populated by TPPs to inform the User of the
        type of Creditor being authorized, which facilitates providing information during the Consent journey.
    AEBankServiceInitiationRichAuthorizationRequests.AERisk:
      type: object
      properties:
        DebtorIndicators:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEDebtorIndicators'
        DestinationDeliveryAddress:
          type: object
          properties:
            RecipientType:
              type: string
              enum:
                - Individual
                - Corporate
            RecipientName:
              type: object
              properties:
                en:
                  type: string
                ar:
                  type: string
              additionalProperties: false
            NationalAddress:
              $ref: '#/components/schemas/AEAddress'
          description: Destination Delivery Address
          additionalProperties: false
        TransactionIndicators:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AETransactionIndicators'
        CreditorIndicators:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorIndicators'
      description: >-
        The Risk section is sent by the TPP to the LFI. It is used to specify additional details for risk/fraud scoring
        regarding Payments.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEDebtorIndicators:
      type: object
      properties:
        Authentication:
          type: object
          properties:
            AuthenticationChannel:
              type: string
              enum:
                - App
                - Web
            PossessionFactor:
              type: object
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - FIDO2SecurityKey
                    - Passkey
                    - OTPDevice
                    - OTPApp
                    - SMSOTP
                    - EmailOTP
                    - PushNotification
                    - WebauthnToken
                    - SecureEnclaveKey
                    - HardwareOTPKey
                    - TrustedDevice
                    - Other
              additionalProperties: false
            KnowledgeFactor:
              type: object
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - PIN
                    - Password
                    - SecurityQuestion
                    - SMSOTP
                    - EmailOTP
                    - OTPPush
                    - Other
              additionalProperties: false
            InherenceFactor:
              type: object
              properties:
                IsUsed:
                  type: boolean
                Type:
                  type: string
                  enum:
                    - Biometric
                    - Fingerprint
                    - FaceRecognition
                    - IrisScan
                    - VoiceRecognition
                    - FIDOBiometric
                    - DeviceBiometrics
                    - Other
              additionalProperties: false
            ChallengeOutcome:
              type: string
              enum:
                - Pass
                - Fail
                - NotPerformed
            AuthenticationFlow:
              type: string
              enum:
                - MFA
                - Other
            AuthenticationValue:
              type: string
            ChallengeDateTime:
              type: string
              format: date-time
          description: The authentication method used by the User to access their account with the TPP
          additionalProperties: false
        UserName:
          type: object
          properties:
            en:
              type: string
            ar:
              type: string
          description: The Name of the User initiating the Payment
          additionalProperties: false
        GeoLocation:
          type: object
          properties:
            Latitude:
              type: string
            Longitude:
              type: string
          required:
            - Latitude
            - Longitude
          description: GPS to identify and track the whereabouts of the connected electronic device.
          additionalProperties: false
        DeviceInformation:
          type: object
          properties:
            DeviceId:
              type: string
            AlternativeDeviceId:
              type: string
            DeviceOperatingSystem:
              type: string
            DeviceOperatingSystemVersion:
              type: string
            DeviceBindingId:
              type: string
            LastBindingDateTime:
              type: string
              format: date-time
            BindingDuration:
              type: string
              format: duration
            BindingStatus:
              type: string
              enum:
                - Active
                - Expired
                - Revoked
                - Suspended
            DeviceType:
              type: string
              enum:
                - Mobile
                - Desktop
                - Tablet
                - Wearable
                - Other
            DeviceManufacturer:
              type: object
              properties:
                Model:
                  type: string
                  maxLength: 50
                Manufacturer:
                  type: string
                  maxLength: 50
              additionalProperties: false
            DeviceLanguage:
              type: string
            DeviceLocalDateTime:
              type: string
            ConnectionType:
              type: string
              enum:
                - WiFi
                - Cellular
                - Other
            ScreenInformation:
              type: object
              properties:
                PixelDensity:
                  type: number
                Orientation:
                  type: string
                  enum:
                    - Portrait
                    - Landscape
              additionalProperties: false
            BatteryStatus:
              type: object
              properties:
                Level:
                  type: number
                  minimum: 0
                  maximum: 100
                IsCharging:
                  type: boolean
              additionalProperties: false
            TouchSupport:
              type: object
              properties:
                Supported:
                  type: boolean
                MaxTouchPoints:
                  type: integer
                  minimum: 0
              additionalProperties: false
            MotionSensors:
              type: object
              properties:
                Status:
                  type: string
                  enum:
                    - InMotion
                    - Stationary
                Accelerometer:
                  type: boolean
                Gyroscope:
                  type: boolean
              additionalProperties: false
            DeviceEnvironmentContext:
              type: array
              items:
                type: string
                enum:
                  - VPNDetected
                  - EmulatorDetected
          description: Detailed device information
          additionalProperties: false
        BiometricCapabilities:
          type: object
          properties:
            SupportsBiometric:
              type: boolean
            BiometricTypes:
              type: array
              items:
                type: string
                enum:
                  - Fingerprint
                  - FacialRecognition
                  - Iris
                  - VoicePrint
                  - Other
          description: Device biometric capabilities
          additionalProperties: false
        AppInformation:
          type: object
          properties:
            AppVersion:
              type: string
            PackageName:
              type: string
            BuildNumber:
              type: string
          description: Mobile application specific information
          additionalProperties: false
        BrowserInformation:
          type: object
          properties:
            UserAgent:
              type: string
            IsCookiesEnabled:
              type: boolean
            AvailableFonts:
              type: array
              items:
                type: string
            Plugins:
              type: array
              items:
                type: string
            PixelRatio:
              type: number
          description: Browser-specific information
          additionalProperties: false
        UserBehavior:
          type: object
          properties:
            ScrollBehavior:
              type: object
              properties:
                Direction:
                  type: string
                  enum:
                    - Up
                    - Down
                    - Both
                Speed:
                  type: number
                Frequency:
                  type: number
              additionalProperties: false
          description: User behavior indicators
          additionalProperties: false
        AccountRiskIndicators:
          type: object
          properties:
            UserOnboardingDateTime:
              type: string
              format: date-time
            LastAccountChangeDate:
              type: string
              format: date
            LastPasswordChangeDate:
              type: string
              format: date
            SuspiciousActivity:
              type: string
              enum:
                - NoSuspiciousActivity
                - SuspiciousActivityDetected
            TransactionHistory:
              type: object
              properties:
                LastDay:
                  type: integer
                  minimum: 0
                LastYear:
                  type: integer
                  minimum: 0
              additionalProperties: false
          description: Risk indicators related to the account
          additionalProperties: false
        SupplementaryData:
          type: object
          description: |-
            Additional information that cannot be captured in the structured fields and/or any other specific block
            This may include information that is not available in the structured fields, such as a user's behavioural data
            like their typing speed and typing patterns.
      description: Debtor (User) Indicators
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AETransactionIndicators:
      type: object
      properties:
        IsCustomerPresent:
          type: boolean
          description: This field differentiates between automatic and manual payment initiation.
        IsContractPresent:
          type: boolean
          description: Indicates if the Creditor has a contractual relationship with the TPP.
        Channel:
          type: string
          enum:
            - Web
            - Mobile
          description: Where the payment has been initiated from.
        ChannelType:
          type: string
          enum:
            - ECommerce
            - InStore
            - InApp
            - Telephone
            - Mail
            - RecurringPayment
            - Other
          description: The channel through which the transaction is being conducted
        SubChannelType:
          type: string
          enum:
            - WebBrowser
            - MobileApp
            - SmartTV
            - WearableDevice
            - POSTerminal
            - ATM
            - KioskTerminal
            - Other
          description: More specific classification of the transaction channel
        PaymentProcess:
          type: object
          properties:
            TotalDuration:
              type: integer
              minimum: 0
            CurrentSessionAttempts:
              type: integer
              minimum: 1
            CurrentSessionFailedAttempts:
              type: integer
              minimum: 0
            Last24HourAttempts:
              type: integer
              minimum: 0
            Last24HourFailedAttempts:
              type: integer
              minimum: 0
          description: Metrics related to the payment process duration and attempts
          additionalProperties: false
        MerchantRisk:
          type: object
          properties:
            DeliveryTimeframe:
              type: string
              enum:
                - ElectronicDelivery
                - SameDayShipping
                - OvernightShipping
                - MoreThan1DayShipping
            ReorderItemsIndicator:
              type: string
              enum:
                - FirstTimeOrder
                - Reorder
            PreOrderPurchaseIndicator:
              type: string
              enum:
                - MerchandiseAvailable
                - FutureAvailability
            IsGiftCardPurchase:
              type: boolean
            IsDeliveryAddressMatchesBilling:
              type: boolean
            AddressMatchLevel:
              type: string
              enum:
                - FullMatch
                - PartialMatch
                - NoMatch
                - NotApplicable
          description: Risk indicator details provided by the merchant
          additionalProperties: false
        SupplementaryData:
          type: object
          description: Additional information that cannot be captured in the structured fields and/or any other specific block
      description: Transaction Indicators
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AECreditorIndicators:
      type: object
      properties:
        AccountType:
          type: string
          enum:
            - Retail
            - SME
            - Corporate
          description: Specifies the type of account (Retail, SME or Corporate).
        IsCreditorPrePopulated:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEIsCreditorPrePopulated'
        TradingName:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AETradingName'
        IsVerifiedByTPP:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEIsVerifiedbyTPP'
        AdditionalAccountHolderIdentifiers:
          $ref: '#/components/schemas/AEAdditionalAccountHolderIdentifiers'
        MerchantDetails:
          type: object
          properties:
            MerchantId:
              type: string
              minLength: 8
              maxLength: 20
            MerchantName:
              type: string
              minLength: 1
              maxLength: 350
            MerchantSICCode:
              type: string
              minLength: 3
              maxLength: 4
            MerchantCategoryCode:
              type: string
              minLength: 3
              maxLength: 4
          description: >-
            Details of the Merchant involved in the transaction.

            Merchant Details are specified only for those merchant categories that are generally expected to originate
            retail financial transactions
          additionalProperties: false
        IsCreditorConfirmed:
          type: boolean
          description: Creditor account details have been confirmed successfully using Confirmation of Payee
        SupplementaryData:
          type: object
          description: Additional information that cannot be captured in the structured fields and/or any other specific block
      description: Creditor Indicators
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEIsCreditorPrePopulated:
      type: boolean
      description: Is Creditor populated
    AEBankServiceInitiationRichAuthorizationRequests.AEIsVerifiedbyTPP:
      type: boolean
      description: The TPP has onboarded the Creditor
    AEBankServiceInitiationRichAuthorizationRequests.AEInternationalPaymentPII:
      type: object
      properties:
        Initiation:
          type: object
          properties:
            DebtorAccount:
              $ref: >-
                #/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEBankServiceInitiationDebtorAccountProperties
            Creditor:
              type: array
              items:
                $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEInternationalCreditor'
              minItems: 1
              description: >-
                List of Creditors for an international payment consent. Please note that the `ConfirmationOfPayee`
                property is **excluded** from this object as Confirmation of Payee is not expected for international
                payments.
          description: >-
            The Initiation payload is sent by the initiating party to the LFI. It is used to request movement of funds
            from the Debtor Account to a Creditor for one-or-more international payments.
          additionalProperties: false
        Risk:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AERisk'
      description: Elements of Personal Identifiable Information for an International Payment.
      additionalProperties: false
      title: International Payment PII Schema Object
    AEBankServiceInitiationRichAuthorizationRequests.AEInternationalCreditor:
      type: object
      required:
        - CreditorAccount
      properties:
        CreditorAgent:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorAgentProperties'
        Creditor:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorProperties'
        CreditorAccount:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEInternationalCreditorAccountProperties'
      description: >-
        Identification elements for a Creditor for an international payment instruction. Please note that Confirmation of
        Payee is **NOT** required or expected for International Payments, as non-domestic Creditor accounts are not
        supported.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AEInternationalCreditorAccountProperties:
      type: object
      required:
        - SchemeName
        - Identification
        - Name
      properties:
        SchemeName:
          $ref: >-
            #/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorExternalAccountIdentificationCode
        Identification:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEIdentification'
        Name:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AEName'
        TradingName:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AETradingName'
        Type:
          $ref: '#/components/schemas/AEBankServiceInitiationRichAuthorizationRequests.AECreditorAccountTypeCodes'
      description: Unambiguous identification of the account of the creditor to which a credit entry will be posted.
      additionalProperties: false
    AEBankServiceInitiationRichAuthorizationRequests.AECreditorExternalAccountIdentificationCode:
      type: string
      enum:
        - IBAN
        - AccountNumber
      description: >-
        Name of the identification scheme, in a coded form as published in an external list. For international payments
        TPP may use `IBAN`, but must use `AccountNumber` where a local scheme is used to identify the Creditor Account.
  parameters:
    InteractionId:
      name: interactionId
      description: Unique identifier for the interaction with the User
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/InteractionId'
  securitySchemes:
    OzoneConnectJwtAuth:
      description: |
        Communications between the API Hub and the LFI Ozone Connect implementation are
        secured using the "JWT Auth" mechanism, where the Client presents a signed JSON
        Web Token as a credential.

        The Server MUST verify the signature in order to authenticate the Client.

        Please note that the value of the `scheme` parameter is not a registered HTTP
        Authentication Scheme, to indicate it is specific to Ozone Connect. Please
        refer to API Hub documentation for further details.
      type: http
      scheme: Ozone-Connect-JWT-Auth
