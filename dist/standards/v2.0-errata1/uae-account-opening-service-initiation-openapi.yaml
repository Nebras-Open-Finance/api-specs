openapi: 3.0.0
info:
  title: UAE Account Opening API
  description: '## UAE Open Finance Account Opening API Specification'
  version: v2.0-errata1
tags:
  - name: Accounts
    description: Open an LFI account to complete an FX transaction
paths:
  /accounts:
    post:
      operationId: CreateAccount_signedRequest
      summary: Initiate account opening
      description: >-
        Create an Account based on data shared from the LFI. The response provides an account identifier that can be
        used 

        to retrieve the account opening status when the provisioning process is complete.


        Invoking this operation is driven by the User sharing with the TPP whether they already hold an account with a 

        given LFI. There is no expectation that the TPP will automatically discover whether an account at this stage in
        the 

        design as this could compromise data being provided by LFI with the quote.


        Please note that only **signed** request payloads are supported for this operation and TPPs **MUST** sign the 

        payload as a JSON Web Signature, using the relevant signing key.
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
          content:
            application/jwt:
              schema:
                type: object
                properties:
                  iss:
                    type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                  exp:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                  nbf:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                  aud:
                    type: array
                    items:
                      type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                  iat:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                  message:
                    $ref: '#/components/schemas/AECreateAccountResponseBody1'
                required:
                  - iss
                  - exp
                  - nbf
                  - message
                additionalProperties: false
              examples:
                ReadAccountOpeningAwaitingPartyDataSignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningAwaitingPartyDataSignedResponse'
                ReadAccountOpeningCreatedSignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningCreatedSignedResponse'
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/jwt:
            schema:
              type: object
              properties:
                iss:
                  type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                exp:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                nbf:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                aud:
                  type: array
                  items:
                    type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                iat:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                message:
                  $ref: '#/components/schemas/AECreateAccountRequestBody1'
              required:
                - iss
                - exp
                - nbf
                - message
              additionalProperties: false
            examples:
              CreateAccountSignedRequest:
                $ref: '#/components/examples/CreateAccountSignedRequest'
        description: Signed request body for creating a new account
      security:
        - TPPOAuth2Security:
            - account-opening
  /accounts/{AccountId}/status:
    get:
      operationId: Account_read
      summary: Retrieve the status of an account opening request
      description: >-
        Retrieve the status of a account opening request based on a given account identifier. The response provides the

        status of the account and, when opened, the account details so the TPP can stage a payment for a given FX 

        transaction to be executed.


        A TPP will require the explicit consent of the User to see all account details, as implemented in Bank Data
        Sharing.

        An Access Token granted for account opening operation does not have the relevant scope to retrieve the full
        account

        details.
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: The request has succeeded.
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/AEReadAccountResponseBody1'
              examples:
                ReadAccountOpeningAwaitingPartyDataUnsignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningAwaitingPartyDataUnsignedResponse'
                ReadAccountOpeningCreatedUnsignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningCreatedUnsignedResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AEReadAccountResponseBody1'
              examples:
                ReadAccountOpeningAwaitingPartyDataUnsignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningAwaitingPartyDataUnsignedResponse'
                ReadAccountOpeningCreatedUnsignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningCreatedUnsignedResponse'
            application/jwt:
              schema:
                type: object
                properties:
                  iss:
                    type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                  exp:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                  nbf:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                  aud:
                    type: array
                    items:
                      type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                  iat:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                  message:
                    $ref: '#/components/schemas/AEReadAccountResponseBody1'
                required:
                  - iss
                  - exp
                  - nbf
                  - message
                additionalProperties: false
              examples:
                ReadAccountOpeningAwaitingPartyDataSignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningAwaitingPartyDataSignedResponse'
                ReadAccountOpeningCreatedSignedResponse:
                  $ref: '#/components/examples/ReadAccountOpeningCreatedSignedResponse'
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - Accounts
      security:
        - TPPOAuth2Security:
            - account-opening
components:
  parameters:
    AccountId:
      name: AccountId
      in: path
      required: true
      description: Unique identifier for a given account opening instance
      schema:
        $ref: '#/components/schemas/AEAccountIdType'
    Authorization:
      name: authorization
      in: header
      required: true
      description: An Access Token as per https://tools.ietf.org/html/rfc6750
      schema:
        type: string
    x-customer-user-agent:
      name: x-customer-user-agent
      in: header
      required: false
      description: Indicates the user-agent that the User is using.
      schema:
        type: string
    x-fapi-auth-date:
      name: x-fapi-auth-date
      in: header
      required: false
      description: |-
        The time when the User last logged in with the TPP. 
        All dates in the HTTP headers are represented as RFC 7231 Full Dates. An example is below: 
        Sun, 10 Sep 2017 19:43:31 UTC
      schema:
        type: string
        pattern: >-
          ^(Mon|Tue|Wed|Thu|Fri|Sat|Sun), \d{2} (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) \d{4}
          \d{2}:\d{2}:\d{2} (GMT|UTC)$
    x-fapi-customer-ip-address:
      name: x-fapi-customer-ip-address
      in: header
      required: false
      description: The User's IP address if the User is currently logged in with the TPP.
      schema:
        type: string
    x-fapi-interaction-id:
      name: x-fapi-interaction-id
      in: header
      required: false
      description: An RFC4122 UID used as a correlation ID.
      schema:
        type: string
  schemas:
    AEAccount:
      anyOf:
        - type: object
          properties:
            OpeningStatusUpdateDateTime:
              $ref: '#/components/schemas/OpeningStatusUpdateDateTime'
            OpeningStatus:
              anyOf:
                - type: string
                  enum:
                    - AwaitingPartyData
                - type: string
                  enum:
                    - Pending
                - type: string
                  enum:
                    - Rejected
              description: >
                The status of the opening of the account, based on progress at the LFI, prior to the account being
                created


                The values are defined as follows:


                * AwaitingPartyData: The account is awaiting user data to be provided.

                * Pending: The account is pending opening, based on LFI processes being completed.

                * Rejected: The account opening has been rejected by the LFI due to insufficient data or failure to
                validate the User data.
          required:
            - OpeningStatusUpdateDateTime
            - OpeningStatus
          additionalProperties: false
        - type: object
          properties:
            Currency:
              allOf:
                - $ref: '#/components/schemas/UAEAccountInformationAPI.ActiveOrHistoricCurrencyCode_0'
              description: Currency of the account.
            AccountIdentifiers:
              type: array
              items:
                type: object
                properties:
                  SchemeName:
                    type: string
                    enum:
                      - IBAN
                    description: >-
                      Name of the identification scheme for the account. Encoded with allowable values published in an
                      external list.
                  Identification:
                    $ref: '#/components/schemas/UAEAccountInformationAPI.Identification_0'
                  Name:
                    $ref: '#/components/schemas/UAEAccountInformationAPI.Name_0'
                required:
                  - SchemeName
                  - Identification
                additionalProperties: false
              minItems: 1
              description: Identification of the account at the LFI, which must be an IBAN in the Open Finance Framework.
            Servicer:
              type: object
              properties:
                SchemeName:
                  allOf:
                    - $ref: '#/components/schemas/UAEAccountInformationAPI.AEExternalFinancialInstitutionIdentificationCode'
                  description: The scheme name that identifies the LFI, which can be `BICFI` (SWIFT code) or `Other`
                Identification:
                  allOf:
                    - $ref: '#/components/schemas/UAEAccountInformationAPI.Identification_1'
                  description: The LFI identification value.
              required:
                - SchemeName
                - Identification
              description: >-
                Account-holding LFI identification, provided where this cannot be deterministically correlated using the
                IBAN.
              additionalProperties: false
            OpeningStatusUpdateDateTime:
              $ref: '#/components/schemas/OpeningStatusUpdateDateTime'
            OpeningStatus:
              type: string
              enum:
                - Created
              description: The account has been created, and the values for executing the FX transaction are now available.
            CreationDateTime:
              $ref: '#/components/schemas/CreationDateTime'
          required:
            - Currency
            - AccountIdentifiers
            - OpeningStatusUpdateDateTime
            - OpeningStatus
            - CreationDateTime
          additionalProperties: false
      description: >-
        The account status object, which includes the account properties and the status of the account opening process.
        The 

        properties of the account share the same structure as the Bank Data Sharing API description, in an effort to
        maintain 

        consistency with other open finance APIs, but are reduced to ensure only the data required to execute an FX

        transaction are provided.


        A TPP must request access through Bank Data Sharing to be provided with all details of the account.
    AEAccountIdType:
      type: string
      minLength: 1
      maxLength: 40
      description: >-
        A unique and immutable identifier produced by the LFI to identify the account resource.This identifier has no
        meaning to the account owner (User 1).
    AEAccountOpeningDataSharingAudit:
      type: object
      required:
        - JSONPath
        - Action
      properties:
        JSONPath:
          type: string
          description: The JSONPath expression pointing to the data that has been changed in the original shared data payload.
          example: $.Data.Party.EmiratesId
        Action:
          type: string
          enum:
            - Added
            - Updated
            - Removed
          description: The action that was taken by the User
        OriginalValue:
          type: string
          description: >-
            The original value that was shared through Bank Data Sharing. Only applies if the Action is Updated or
            Removed.
      description: >-
        Provides an audit trail of changes made by a User to the data shared from the LFI through Bank Data Sharing.


        Each element in the array is a JSONPath expression that points to the data that has been changed and the
        original value supplied through data sharing.


        TPP must adhere to [RFC 9535](https://datatracker.ietf.org/doc/html/rfc9535) when constructing JSON Path
        expressions. This value can be omitted when no changes are made by the User.
      additionalProperties: false
    AEAccountOpeningLinks1:
      type: object
      required:
        - Self
      properties:
        Self:
          $ref: '#/components/schemas/Self'
        AccountOpeningRedirectUrl:
          type: string
          format: uri
          description: >-
            A redirect URL provided by the LFI to complete the FX trade. The TPP must redirect the User to this URL.

            The URL is optional as the LFI may have all required information through party data to complete account
            creation.
      additionalProperties: false
    AEAccountOpeningRequest:
      type: object
      properties:
        LinkedOperations:
          type: object
          properties:
            FxQuoteId:
              allOf:
                - $ref: '#/components/schemas/FxServiceInitiation.FxQuoteIdType'
              description: The quote identifier returned by the LFI in the FX Quote.
          required:
            - FxQuoteId
          minProperties: 1
          description: >-
            Operations that are linked to the account opening request, such as an accepted FX quote where no settlement
            account is available at the LFI for the deposit of a funding payment. 


            At least one property must be supplied, or the property omitted.
          additionalProperties: false
        Account:
          allOf:
            - $ref: '#/components/schemas/UAEAccountInformationAPI.AECashAccount6_1'
          description: Details of the bank account details shared from the LFI through a data sharing consent with the TPP.
        Party:
          $ref: '#/components/schemas/AEIdentityAssurance'
        DataSharingAudit:
          type: array
          items:
            $ref: '#/components/schemas/AEAccountOpeningDataSharingAudit'
          description: List of changes to account data shared with TPP made by User.
          example:
            - JSONPath: $.Data.Party.GivenName
              Action: Updated
              OriginalValue: Harold
            - JSONPath: $.Data.Party.FamilyName
              Action: Updated
              OriginalValue: Smith
      description: |-
        Request body for creating a new account based on a quote and shared user data.

        PartyData is optional as LFI can support manual data entry by the User when they 
        use the LFI user interface.
      additionalProperties: false
    AECreateAccountRequestBody1:
      type: object
      properties:
        Data:
          allOf:
            - $ref: '#/components/schemas/AEAccountOpeningRequest'
          description: >-
            Properties of the accepted quote. Must be supplied when initiating account opening, but can be omitted when
            managing Webhook subscriptions. The request will be rejected if the account opening request is replayed.
        Subscription:
          allOf:
            - $ref: '#/components/schemas/EventNotification'
          description: >-
            Allows a TPP to subscribe to event notifications through a Webhook. Omitted where the TPP does not want to
            subscribe to notifications.
      additionalProperties: false
    AECreateAccountResponseBody1:
      type: object
      required:
        - Data
        - Links
        - Meta
      properties:
        Data:
          $ref: '#/components/schemas/AEAccount'
        Links:
          $ref: '#/components/schemas/AEAccountOpeningLinks1'
        Meta:
          $ref: '#/components/schemas/Meta'
      additionalProperties: false
    AECustomErrorCode:
      type: string
      pattern: ^[A-Za-z]+\.[A-Za-z0-9]+$
    AEError400:
      anyOf:
        - $ref: '#/components/schemas/AEError400Codes'
        - $ref: '#/components/schemas/AECustomErrorCode'
    AEError400Codes:
      type: string
      enum:
        - Consent.Invalid
        - Consent.BusinessRuleViolation
        - Consent.FailsControlParameters
        - Consent.InvalidUserIdentifier
        - JWS.InvalidSignature
        - JWS.Malformed
        - JWS.InvalidClaim
        - JWS.InvalidHeader
        - JWE.DecryptionError
        - JWE.InvalidHeader
        - GenericRecoverableError
        - GenericError
        - Event.UnexpectedEvent
        - Body.InvalidFormat
        - Resource.InvalidFormat
    AEError400ResponseBody:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            type: object
            properties:
              Code:
                $ref: '#/components/schemas/AEError400'
              Message:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or
                  'RequestedExecutionDateTime must be in future'

                  UAEOF doesn't standardise this field
              Path:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Recommended but optional reference to the JSON Path of the field with error, e.g.,
                  $.Data.Initiation.InstructedAmount.Currency
              Url:
                type: string
                description: URL to help remediate the problem, or provide more information, or to API Reference, or help etc
            required:
              - Code
              - Message
            additionalProperties: false
          minItems: 1
      description: An array of detail error codes, and messages, and URLs to documentation to help remediation.
      additionalProperties: false
    AEError400ResponseBodySigned:
      type: object
      required:
        - iss
        - exp
        - nbf
        - message
      properties:
        iss:
          type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)'
        exp:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)'
        nbf:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)'
        aud:
          type: array
          items:
            type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)'
        iat:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)'
        message:
          $ref: '#/components/schemas/AEError400ResponseBody'
      additionalProperties: false
    AEError403:
      anyOf:
        - $ref: '#/components/schemas/AEError403Codes'
        - $ref: '#/components/schemas/AECustomErrorCode'
    AEError403Codes:
      type: string
      enum:
        - AccessToken.InvalidScope
        - Consent.TransientAccountAccessFailure
        - Consent.AccountTemporarilyBlocked
        - Consent.PermanentAccountAccessFailure
        - GenericRecoverableError
        - GenericError
    AEError403ResponseBody:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            type: object
            properties:
              Code:
                $ref: '#/components/schemas/AEError403'
              Message:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or
                  'RequestedExecutionDateTime must be in future'

                  UAEOF doesn't standardise this field
              Path:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Recommended but optional reference to the JSON Path of the field with error, e.g.,
                  $.Data.Initiation.InstructedAmount.Currency
              Url:
                type: string
                description: URL to help remediate the problem, or provide more information, or to API Reference, or help etc
            required:
              - Code
              - Message
            additionalProperties: false
          minItems: 1
      description: An array of detail error codes, and messages, and URLs to documentation to help remediation.
      additionalProperties: false
    AEError403ResponseBodySigned:
      type: object
      required:
        - iss
        - exp
        - nbf
        - message
      properties:
        iss:
          type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)'
        exp:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)'
        nbf:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)'
        aud:
          type: array
          items:
            type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)'
        iat:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)'
        message:
          $ref: '#/components/schemas/AEError403ResponseBody'
      additionalProperties: false
    AEError500:
      anyOf:
        - $ref: '#/components/schemas/AEErrorGenericCodes'
        - $ref: '#/components/schemas/AECustomErrorCode'
    AEError500ResponseBody:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            type: object
            properties:
              Code:
                $ref: '#/components/schemas/AEError500'
              Message:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or
                  'RequestedExecutionDateTime must be in future'

                  UAEOF doesn't standardise this field
              Path:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Recommended but optional reference to the JSON Path of the field with error, e.g.,
                  $.Data.Initiation.InstructedAmount.Currency
              Url:
                type: string
