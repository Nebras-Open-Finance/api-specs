          $ref: '#/components/schemas/UAEAccountInformationAPI.EvidenceMetadata'
      description: Evidence being referred to
      additionalProperties: false
    UAEAccountInformationAPI.ISODateTime:
      type: string
      format: date-time
      description: |-
        All dates in the JSON payloads are represented in ISO 8601 date-time format.
        All date-time fields in responses must include the timezone. An example is below:
        2017-04-05T10:43:07+00:00
    UAEAccountInformationAPI.Identification_0:
      type: string
      minLength: 1
      maxLength: 400
      description: >-
        Identification for the account assigned by the LFI based on the Account Scheme Name. This identification is
        known by the User 1 account owner. For IBAN, refer to the ISO Standard 13616.
    UAEAccountInformationAPI.Identification_1:
      type: string
      minLength: 1
      maxLength: 35
      description: >-
        * /accounts resource

        Unique and unambiguous identification of the LFI as the account servicing institution for the Open Banking
        Services.


        * /beneficiaries resource

        Unique and unambiguous identification of the Creditor Agency as the servicing institution of the Beneficiary.


        * /scheduled-payments resource

        Unique and unambiguous identification of the LFI as the account servicing institution for the Open Banking
        Services.


        * /standing-orders resource

        Unique and unambiguous identification of the LFI as the account servicing institution for the Open Banking
        Services.


        * /transactions resource

        Unique and unambiguous identification of the LFI as the account servicing institution for the Open Banking
        Services.


        *  Notes:

        Based on the value of the field **SchemeName**, this entry may be :

        * BICFI: The BIC/SWIFT Code

        * Other: The ID; A Country Code followed by a Bank Code (4 character code).
    UAEAccountInformationAPI.Name_0:
      type: string
      minLength: 1
      maxLength: 70
      description: >-
        The account name is the name or names of the User 1 account owner(s) represented at an account level, as
        displayed by the LFI's online channels. Note: The account name is not the product name or the nickname of the
        account.
    UAEAccountInformationAPI.TrustFrameworkCode:
      type: string
      enum:
        - Undefined
      description: >-
        Identifies the trust framework used for verification. This consists of a set of rules and standards and sets out
        requirements so that organisations know what ‘good’ identity verification looks like.

        Trust Frameworks:
        [https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)
    UAEAccountInformationAPI.VerifiedClaimVerification:
      type: object
      required:
        - TrustFramework
      properties:
        TrustFramework:
          $ref: '#/components/schemas/UAEAccountInformationAPI.TrustFrameworkCode'
        AssuranceLevel:
          type: string
          description: >-
            Determines the assurance level associated with the User in the respective VerifiedClaims. The value range
            depends on the respective TrustFramework value.

            Assurance Level:
            [https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)
        AssuranceProcess:
          $ref: '#/components/schemas/UAEAccountInformationAPI.AssuranceProcess'
        Time:
          description: >-
            Representing the date and time when the identity verification process took place. All dates in the JSON
            payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the
            timezone. An example is below: 2017-04-05T10:43:07+00:00
        VerificationProcess:
          type: string
          description: >-
            Unique reference to the identity verification process as performed by the OP. Used for identifying and
            retrieving details in case of disputes or audits. Presence of this element might be required for certain
            trust frameworks.
        Evidence:
          anyOf:
            - $ref: '#/components/schemas/UAEAccountInformationAPI.AEPartyIdentityEvidenceTypeDocument'
            - $ref: '#/components/schemas/UAEAccountInformationAPI.AEPartyIdentityEvidenceTypeElectronicRecord'
          description: >-
            The type of evidence allowed for providing verification.

            OpenID Connect for Identity Assurance 1.0:
            [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element)
      description: >-
        Verification

        [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element)
      additionalProperties: false
  examples:
    CreateAccountSignedRequest:
      summary: Create Account Opening Example - Signed Request
      description: Create an account opening request for a new account with party data provided through data sharing.
      value:
        iss: https://lfi.openfinanceapihub.ae
        exp: 1738848508
        nbf: 1738844908
        message:
          Data:
            LinkedOperations:
              FxQuoteId: 1d747c7b-7285-43e2-bb26-f7d6f195177e
            Party:
              Claims:
                IdentityType: Person
                FullName: Hamad Ali
                GivenName: Hamad
                Surname: Ali
                EmiratesId: 7841-1234-1234567-1
                EmiratesIdExpiryDate: '2032-05-05'
                ResidentialAddress:
                  AddressLine:
                    - Example Address Line
                  Country: AE
    ReadAccountOpeningAwaitingPartyDataUnsignedResponse:
      summary: Read Account Opening Example - AwaitingPartyData - Unsigned Response
      description: The account opening is pending the User providing additional data.
      value:
        Data:
          OpeningStatus: AwaitingPartyData
          OpeningStatusUpdateDateTime: '2021-01-01T00:00:00+04:00'
        Links:
          Self: https://lfi.openfinanceapihub.ae/accounts/7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
          AccountOpeningRedirectUrl: https://lfi.example.ae/accounts?account-id=7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
        Meta: {}
    ReadAccountOpeningAwaitingPartyDataSignedResponse:
      summary: Read Account Opening Example - AwaitingPartyData - Signed Response
      description: The account opening is pending the User providing additional data.
      value:
        iss: https://lfi.openfinanceapihub.ae
        exp: 1738848508
        nbf: 1738844908
        message:
          Data:
            OpeningStatus: AwaitingPartyData
            OpeningStatusUpdateDateTime: '2021-01-01T00:00:00+04:00'
          Links:
            Self: https://lfi.openfinanceapihub.ae/accounts/7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
            AccountOpeningRedirectUrl: https://lfi.example.ae/accounts?account-id=7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
          Meta: {}
    ReadAccountOpeningCreatedUnsignedResponse:
      summary: Read Account Opening Example - Created - Unsigned Response
      description: The account has been successfully opened and account details are available for use.
      value:
        Data:
          Currency: AED
          AccountIdentifiers:
            - SchemeName: IBAN
              Identification: AE460090000000123456789
              Name: Hamad Ali
          OpeningStatus: Created
          OpeningStatusUpdateDateTime: '2021-01-01T01:00:00+04:00'
          CreationDateTime: '2021-01-01T01:00:00+04:00'
        Links:
          Self: https://lfi.openfinanceapihub.ae/accounts/7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
        Meta: {}
    ReadAccountOpeningCreatedSignedResponse:
      summary: Read Account Opening Example - Created - Signed Response
      description: The account has been successfully opened and account details are available for use.
      value:
        iss: https://lfi.openfinanceapihub.ae
        exp: 1738848508
        nbf: 1738844908
        message:
          Data:
            Currency: AED
            AccountIdentifiers:
              - SchemeName: IBAN
                Identification: AE460090000000123456789
                Name: Hamad Ali
            OpeningStatus: Created
            OpeningStatusUpdateDateTime: '2021-01-01T01:00:00+04:00'
            CreationDateTime: '2021-01-01T01:00:00+04:00'
          Links:
            Self: https://lfi.openfinanceapihub.ae/accounts/7a79d7f0-4054-4ee8-bce2-ef696f1a7a31
          Meta: {}
  securitySchemes:
    TPPOAuth2Security:
      type: oauth2
      description: >-
        TPP confidential client authorization with the LFI to stage a consent. **Please refer to [OpenID FAPI Security
        Profile 1.0 -Part 2
        Advanced](https://openid.net/specs/openid-financial-api-part-2-1_0.html#authorization-server) - 5.2.2 point 14 -
        shall authenticate the confidential client using one of the following methods private_key_jwt and [OpenID
        Connect Core 1.0](https://openid.net/specs/openid-connect-core-1_0.html#ClientAuthentication) 9. Client
        Authentication private_key_jwt**
      flows:
        clientCredentials:
          tokenUrl: https://authserver.example/token
          scopes:
            account-opening: Ability to open an account at a given LFI for the deposit of funds
