openapi: 3.0.0
info:
  title: UAE FX API
  description: '## UAE Open Finance FX API Specification'
  version: v2.1
tags:
  - name: FX Quotes
    description: Operations to create foreign exchange quotes at a given LFI
paths:
  /fx-quotes:
    post:
      operationId: CreateFxQuote_unsignedRequest_CreateFxQuote_signedRequest
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
      description: |-
        Create an FX quote based on a given currency pair. The quote request must be 
        sent to all LFIs individually, with responses aggregated by the TPP to provide
        the User a choice of quotes across providers.

        The User may already have a relationship with a given LFI. The TPP can 
        therefore include party data in the request to help the LFI correlate the User
        with an existing account or relationship. Including party data is optional but
        will allow contractual or pre-agreed rates to be generated by the LFI to help
        provide an informed choice to the User.

        If a User selects a quote from an LFI that they do not have a relationship with
        the TPP will be able to use the Account Opening API to initiate the creation of
        a new account for User.
      summary: Create an FX quote
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/AECreateFxQuoteResponseBody1'
              examples:
                CreateFXQuoteUnsignedResponse:
                  $ref: '#/components/examples/CreateFXQuoteUnsignedResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AECreateFxQuoteResponseBody1'
              examples:
                CreateFXQuoteUnsignedResponse:
                  $ref: '#/components/examples/CreateFXQuoteUnsignedResponse'
            application/jwt:
              schema:
                type: object
                properties:
                  iss:
                    type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                  exp:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                  nbf:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                  aud:
                    type: array
                    items:
                      type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                  iat:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                  message:
                    $ref: '#/components/schemas/AECreateFxQuoteResponseBody1'
                required:
                  - iss
                  - exp
                  - nbf
                  - message
                additionalProperties: false
              examples:
                CreateFXQuoteSignedResponse:
                  $ref: '#/components/examples/CreateFXQuoteSignedResponse'
        '204':
          description: The LFI did not respond with a quote as the requested currency requirements could not be fulfilled.
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - FX Quotes
      requestBody:
        required: true
        content:
          application/json; charset=utf-8:
            schema:
              $ref: '#/components/schemas/AECreateFxQuoteRequestBody1'
            examples:
              CreateFXQuoteUnsignedRequest:
                $ref: '#/components/examples/CreateFXQuoteUnsignedRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/AECreateFxQuoteRequestBody1'
            examples:
              CreateFXQuoteUnsignedRequest:
                $ref: '#/components/examples/CreateFXQuoteUnsignedRequest'
          application/jwt:
            schema:
              type: object
              properties:
                iss:
                  type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                exp:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                nbf:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                aud:
                  type: array
                  items:
                    type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                iat:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                message:
                  $ref: '#/components/schemas/AECreateFxQuoteRequestBody1'
              required:
                - iss
                - exp
                - nbf
                - message
              additionalProperties: false
            examples:
              CreateFXQuoteSignedRequest:
                $ref: '#/components/examples/CreateFXQuoteSignedRequest'
        description: Unsigned FX Quote Request Signed FX Quote Request
      security:
        - TPPOAuth2Security:
            - fx
  /fx-quotes/{FxQuoteId}:
    get:
      operationId: FxQuote_read
      summary: Retrieve an FX quote
      description: |-
        Retrieve an FX quote based on a given quote identifier. The quote will include
        all the details submitted in the quote request together with the status of the
        quote.
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
        - $ref: '#/components/parameters/FxQuoteId'
      responses:
        '200':
          description: The request has succeeded.
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/AEReadFxQuoteResponseBody1'
              examples:
                ReadFXQuoteUnsignedResponse:
                  $ref: '#/components/examples/ReadFXQuoteUnsignedResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AEReadFxQuoteResponseBody1'
              examples:
                ReadFXQuoteUnsignedResponse:
                  $ref: '#/components/examples/ReadFXQuoteUnsignedResponse'
            application/jwt:
              schema:
                type: object
                properties:
                  iss:
                    type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                  exp:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                  nbf:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                  aud:
                    type: array
                    items:
                      type: string
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                  iat:
                    type: number
                    description: >-
                      [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                  message:
                    $ref: '#/components/schemas/AEReadFxQuoteResponseBody1'
                required:
                  - iss
                  - exp
                  - nbf
                  - message
                additionalProperties: false
              examples:
                ReadFXQuoteSignedResponse:
                  $ref: '#/components/examples/ReadFXQuoteSignedResponse'
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - FX Quotes
      security:
        - TPPOAuth2Security:
            - fx
    patch:
      operationId: FxQuote_signedRequest
      summary: Update an FX quote status
      description: |-
        Update the status of a quote to Accepted as an indicator that the User has 
        accepted the quote and will proceed with the FX trade. Completion of the trade 
        is reliant on a funding account being available, which may require the creation 
        of a new account at the LFI to complete the trade. The TPP will invoke the 
        Account Opening API to initiate the creation of a new account for the User, 
        sending the party data they previously retrieved through Bank Data Sharing or
        that the User shared with the TPP manually.
            
        If the User does not have an account with the LFI they will indicate this to the 
        TPP, who will optionally invoke the Account Opening API to initiate the creation
        of a new account for the User, sending User agreed through an existing consent 
        to the LFI.

        Please note that only **signed** request payloads are supported for this operation
        and TPPs **MUST** sign the payload as a JSON Web Signature, using the relevant 
        signing key.
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
        - $ref: '#/components/parameters/FxQuoteId'
      responses:
        '204':
          description: No content
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - FX Quotes
      requestBody:
        required: true
        content:
          application/jwt:
            schema:
              type: object
              properties:
                iss:
                  type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)
                exp:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)
                nbf:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)
                aud:
                  type: array
                  items:
                    type: string
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)
                iat:
                  type: number
                  description: >-
                    [https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)
                message:
                  $ref: '#/components/schemas/AEUpdateFxQuoteRequestBody1'
              required:
                - iss
                - exp
                - nbf
                - message
              additionalProperties: false
            examples:
              ReadFXQuoteSignedResponse:
                $ref: '#/components/examples/UpdateFxQuoteSignedRequest'
        description: Signed FX Quote Request
      security:
        - TPPOAuth2Security:
            - fx
  /fx-quotes/{FxQuoteId}/subscription:
    patch:
      operationId: UpdateWebhookSubscription_update
      summary: Update the subscription for Event Notifications for a given FX Quote request
      description: >-
        Allows a TPP to update their subscription to status changes for FX Quote. Only applies to FX quotes that have
        previously been updated to an `Accepted` state, having been agreed by the User.


        No other changes to the FX Quote request are permitted. The `subscription` sub-resource is implemented to ensure
        a separation of concerns between the subscription and the main FX quote data.
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-customer-user-agent'
        - $ref: '#/components/parameters/x-fapi-auth-date'
        - $ref: '#/components/parameters/x-fapi-customer-ip-address'
        - $ref: '#/components/parameters/x-fapi-interaction-id'
        - $ref: '#/components/parameters/FxQuoteId'
      responses:
        '204':
          description: No content
          headers:
            x-fapi-interaction-id:
              required: false
              description: An RFC4122 UID used as a correlation ID.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'
        '404':
          $ref: '#/components/responses/404Error'
        '405':
          $ref: '#/components/responses/405Error'
        '406':
          $ref: '#/components/responses/406Error'
        '415':
          $ref: '#/components/responses/415Error'
        '429':
          $ref: '#/components/responses/429Error'
        '500':
          $ref: '#/components/responses/500Error'
      tags:
        - FX Quotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AEUpdateEventSubscriptionRequestBody1'
      security:
        - TPPOAuth2Security:
            - fx
components:
  parameters:
    Authorization:
      name: authorization
      in: header
      required: true
      description: An Access Token as per https://tools.ietf.org/html/rfc6750
      schema:
        type: string
    FxQuoteId:
      name: FxQuoteId
      in: path
      required: true
      description: Unique identifier for a given FX quote
      schema:
        $ref: '#/components/schemas/FxQuoteIdType'
    x-customer-user-agent:
      name: x-customer-user-agent
      in: header
      required: false
      description: Indicates the user-agent that the User is using.
      schema:
        type: string
    x-fapi-auth-date:
      name: x-fapi-auth-date
      in: header
      required: false
      description: |-
        The time when the User last logged in with the TPP. 
        All dates in the HTTP headers are represented as RFC 7231 Full Dates. An example is below: 
        Sun, 10 Sep 2017 19:43:31 UTC
      schema:
        type: string
        pattern: >-
          ^(Mon|Tue|Wed|Thu|Fri|Sat|Sun), \d{2} (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) \d{4}
          \d{2}:\d{2}:\d{2} (GMT|UTC)$
    x-fapi-customer-ip-address:
      name: x-fapi-customer-ip-address
      in: header
      required: false
      description: The User's IP address if the User is currently logged in with the TPP.
      schema:
        type: string
    x-fapi-interaction-id:
      name: x-fapi-interaction-id
      in: header
      required: false
      description: An RFC4122 UID used as a correlation ID.
      schema:
        type: string
  schemas:
    AEAddressItem:
      type: array
      items:
        type: object
        properties:
          AddressType:
            type: string
            enum:
              - Billing
              - Business
              - Correspondence
              - DeliveryTo
              - MailTo
              - POBox
              - Postal
              - Permanent
              - Residential
              - Statement
              - Other
          AddressLine:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 7
          BuildingNumber:
            type: string
            minLength: 1
            maxLength: 16
          BuildingName:
            type: string
            minLength: 1
            maxLength: 140
          Floor:
            type: string
            minLength: 1
            maxLength: 70
          StreetName:
            type: string
            minLength: 1
            maxLength: 140
          DistrictName:
            type: string
            minLength: 1
            maxLength: 140
          PostBox:
            type: string
            minLength: 1
            maxLength: 16
          TownName:
            type: string
            minLength: 1
            maxLength: 140
          CountrySubDivision:
            anyOf:
              - type: string
                enum:
                  - AbuDhabi
                  - Ajman
                  - Dubai
                  - Fujairah
                  - RasAlKhaimah
                  - Sharjah
                  - UmmAlQuwain
              - type: string
          Country:
            type: string
            pattern: ^[A-Z]{2}$
        required:
          - AddressType
          - AddressLine
          - Country
        additionalProperties: false
      minItems: 1
      description: One-or-more addresses related to a given subject.
    AECharges:
      type: object
      required:
        - ChargeBearer
        - Type
        - Amount
      properties:
        ChargeBearer:
          $ref: '#/components/schemas/UAEPaymentAPI.AEChargeBearerType1Code'
        Type:
          $ref: '#/components/schemas/UAEPaymentAPI.AEExternalPaymentChargeTypeCode'
        Amount:
          $ref: '#/components/schemas/UAEPaymentAPI.AEActiveCurrencyAmount'
        Description:
          type: string
          minLength: 1
          maxLength: 140
          description: Description of the charge, for display to the User to help explain why the charge is levied.
      additionalProperties: false
    AECreateFxQuoteRequestBody1:
      type: object
      required:
        - Data
      properties:
        Data:
          $ref: '#/components/schemas/AEFxQuoteRequestProperties'
      description: Request body for creating a new FX quote
      additionalProperties: false
    AECreateFxQuoteResponseBody1:
      type: object
      required:
        - Data
        - Links
        - Meta
      properties:
        Data:
          $ref: '#/components/schemas/AEFxQuoteProperties'
        Links:
          type: object
          properties:
            Self:
              $ref: '#/components/schemas/Self'
            LiabilityPolicy:
              allOf:
                - $ref: '#/components/schemas/Uri'
              description: Link to liability policy, provided by LFI for display to the User.
            RefundCancellationPolicy:
              allOf:
                - $ref: '#/components/schemas/Uri'
              description: Link to refund and cancellation policy, provided by LFI for display to the User.
          required:
            - Self
            - LiabilityPolicy
            - RefundCancellationPolicy
          description: Links to information associated with the quote response.
          additionalProperties: false
        Meta:
          $ref: '#/components/schemas/Meta'
      additionalProperties: false
    AECustomErrorCode:
      type: string
      pattern: ^[A-Za-z]+\.[A-Za-z0-9]+$
    AEError400:
      anyOf:
        - $ref: '#/components/schemas/AEError400Codes'
        - $ref: '#/components/schemas/AECustomErrorCode'
    AEError400Codes:
      type: string
      enum:
        - Consent.Invalid
        - Consent.BusinessRuleViolation
        - Consent.FailsControlParameters
        - Consent.InvalidUserIdentifier
        - JWS.InvalidSignature
        - JWS.Malformed
        - JWS.InvalidClaim
        - JWS.InvalidHeader
        - JWS.InvalidPayload
        - JWE.DecryptionError
        - JWE.InvalidHeader
        - GenericRecoverableError
        - GenericError
        - Event.UnexpectedEvent
        - Body.InvalidFormat
        - Resource.InvalidFormat
    AEError400ResponseBody:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            type: object
            properties:
              Code:
                $ref: '#/components/schemas/AEError400'
              Message:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or
                  'RequestedExecutionDateTime must be in future'

                  UAEOF doesn't standardise this field
              Path:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Recommended but optional reference to the JSON Path of the field with error, e.g.,
                  $.Data.Initiation.InstructedAmount.Currency
              Url:
                type: string
                description: URL to help remediate the problem, or provide more information, or to API Reference, or help etc
            required:
              - Code
              - Message
            additionalProperties: false
          minItems: 1
      description: An array of detail error codes, and messages, and URLs to documentation to help remediation.
      additionalProperties: false
    AEError400ResponseBodySigned:
      type: object
      required:
        - iss
        - exp
        - nbf
        - message
      properties:
        iss:
          type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.1)'
        exp:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.4)'
        nbf:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.5)'
        aud:
          type: array
          items:
            type: string
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.3)'
        iat:
          type: number
          description: '[https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6](https://www.rfc-editor.org/rfc/rfc7519#section-4.1.6)'
        message:
          $ref: '#/components/schemas/AEError400ResponseBody'
      additionalProperties: false
    AEError403:
      anyOf:
        - $ref: '#/components/schemas/AEError403Codes'
        - $ref: '#/components/schemas/AECustomErrorCode'
    AEError403Codes:
      type: string
      enum:
        - AccessToken.InvalidScope
        - Consent.TransientAccountAccessFailure
        - Consent.AccountTemporarilyBlocked
        - Consent.PermanentAccountAccessFailure
        - GenericRecoverableError
        - GenericError
    AEError403ResponseBody:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            type: object
            properties:
              Code:
                $ref: '#/components/schemas/AEError403'
              Message:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or
                  'RequestedExecutionDateTime must be in future'

                  UAEOF doesn't standardise this field
              Path:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Recommended but optional reference to the JSON Path of the field with error, e.g.,
                  $.Data.Initiation.InstructedAmount.Currency
