        PolicyExcess:
          allOf:
            - $ref: '#/components/schemas/AEInsurance.AEActiveCurrencyAmount'
          description: >-
            Required if PolicyCoverIncluded is true (Yes) to confirm the deductible or out-of-pocket (excess) amount the
