                        description: >-
                          Details of the insurance policy premium. Requires the `ReadInsurancePremium` permission to be
                          granted by the User.
                    required:
                      - InsurancePolicyId
                required:
                  - data
        '400':
          $ref: '#/components/responses/error400Response'
        '403':
