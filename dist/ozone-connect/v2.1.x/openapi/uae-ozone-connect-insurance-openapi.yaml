                          PrimaryLanguage:
                            allOf:
                              - $ref: '#/components/schemas/AEInsurance.AECustomerPrimaryLanguage'
                            description: Primary language spoken by the insurance policy customer
                          MobileNumber:
                            allOf:
                              - $ref: '#/components/schemas/AEInsurance.AEInsurancePhoneNumberType'
