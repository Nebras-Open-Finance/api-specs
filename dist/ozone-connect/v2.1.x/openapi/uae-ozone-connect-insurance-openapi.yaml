                BankName:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Confirm the Bank or registered finance company providing the car finance.
                FinanceAmount:
                  allOf:
                    - $ref: '#/components/schemas/AEInsurance.AEActiveCurrencyAmount'
