                - BICFI
                - Other
            Identification:
              type: string
            Name:
              type: string
              minLength: 1
              maxLength: 140
            PostalAddress:
              $ref: '#/components/schemas/OzoneConnectConsentEventActionAPIs.AEAddressItem'
          required:
            - SchemeName
