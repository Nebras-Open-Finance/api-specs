                    - Tenant
                  description: Based on enumeration values.
                Construction:
                  type: string
                  enum:
                    - ClassA
                    - ClassB
                    - ClassC
                  description: Type of construction
                Over10Years:
                  type: boolean
                  description: Confirmation whether the property is over 10 years old
                FloodDamage:
                  type: boolean
