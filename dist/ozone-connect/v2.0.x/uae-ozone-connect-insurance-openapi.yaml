        PolicyTerm:
          type: string
          pattern: ^P(\d+Y)?(\d+M)?$
          format: duration
          description: The insurance policy term in years and months, using ISO 8601 compatible duration format
          example: P2Y3M
        CoverStartDate:
          type: string
          format: date
          description: Cover start date
        IsLoanAgainstPolicy:
          type: boolean
          description: Confirmation whether insurance cover is being taken out in connection with a loan / mortgage
        PremiumPaymentTerm:
          type: string
          pattern: ^P(\d+Y)?(\d+M)?$
          description: Term of payments.
        FrequencyPremiumPayment:
          type: string
          enum:
            - Annually
            - OneTime
            - Monthly
            - Quarterly
            - BiAnnual
            - Limited
            - Other
          description: Frequency of premium payments.
      description: Details of policy
