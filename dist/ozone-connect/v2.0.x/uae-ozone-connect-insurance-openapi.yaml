        PreviousApplications:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceQuotePreviousApplications'
          description: Details of previous applications.
        ImportantQuestions:
          allOf:
            - $ref: '#/components/schemas/AERentersInsuranceImportantQuestions'
          description: Important questions to be provided with quote.
    AETravelInsuranceDestinationCountry:
      type: string
      pattern: ^[A-Z]{3}$
    AETravelInsuranceMedicalHistoryProperties:
      type: object
      required:
        - PastTreatment
        - HeartRespiratory
        - Circulatory
        - Liver
        - Cancerous
        - Terminal
        - WaitingList
        - MentalHealth
      properties:
        PastTreatment:
          type: boolean
          description: >-
            Confirmation whether any of the Travellers have been been prescribed medication, received treatment or had a
            consultation for any medical condition in the past two years?
        HeartRespiratory:
          type: boolean
          description: >-
            Confirmation whether any of the Travellers have been diagnosed with or treated for a heart or respiratory
            condition
        Circulatory:
          type: boolean
          description: Confirmation whether any of the Travellers have been diagnosed with or treated for a Circulatory condition
        Liver:
          type: boolean
          description: Confirmation whether any of the Travellers have been diagnosed with or treated for a liver condition
        Cancerous:
          type: boolean
          description: Confirmation whether any of the Travellers have been diagnosed with or treated for a cancerous condition
        Terminal:
          type: boolean
          description: Confirmation whether any of the Travellers have been diagnosed with a terminal condition
        WaitingList:
          type: boolean
          description: Confirmation whether any of the Travellers are currently on a waiting list for treatment or investigation
        MentalHealth:
          type: boolean
          description: >-
            Confirmation whether any of the Travellers have been diagnosed with or treated for any mental health
            conditions
        ConditionDetails:
          type: array
          items:
            type: object
            properties:
              TravellerName:
                type: string
                description: The name of the Traveller the medical 'Yes' response relates to
              QuestionName:
                type: string
                description: >-
                  The Question property name of the 'Yes' response. For example, if `PastTreatment` is true this value
                  should be set to `PastTreatment`.
              Description:
                type: string
                description: The description of the medical condition, diagnosis or treatment
              CurrentDiagnosis:
                type: string
                enum:
                  - NoSymptoms
                  - OngoingSymptoms
                  - OngoingHospitalization
                  - PendingHospitalization
                  - OngoingTreatment
                  - PendingTreatment
                description: The current diagnosis of the declared condition.
              Treated:
                type: string
                enum:
                  - Outpatient
                  - Hospitalized
                  - Both
                  - NotApplicable
                description: Whether the condition relates to hospital treatment
            required:
              - TravellerName
              - QuestionName
              - Description
              - CurrentDiagnosis
              - Treated
          minItems: 1
          description: Required when one or more of the medical questions have a 'Yes' response
