            Make:
              type: string
              description: The brand or manufacturer of the vehicle.
            Model:
              type: string
              description: The specific model name of the vehicle.
            Trim:
              type: string
              description: The variant or trim level of the vehicle, indicating features and specifications
            BodyType:
