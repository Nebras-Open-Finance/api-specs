        - $ref: '#/components/parameters/callerInteractionId'
        - $ref: '#/components/parameters/ozoneInteractionId'
        - $ref: '#/components/parameters/QuoteId'
      responses:
        '204':
          description: No content
        '400':
          $ref: '#/components/responses/error400Response'
        '403':
          $ref: '#/components/responses/error403Response'
        '409':
          $ref: '#/components/responses/error409Response'
        '500':
          $ref: '#/components/responses/error500Response'
        default:
          $ref: '#/components/responses/errorResponse'
      tags:
        - Travel Insurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AEUpdateQuoteStatus1'
components:
  parameters:
    InsurancePolicyId:
      name: InsurancePolicyId
      in: path
      required: true
      description: Unique identifier for a given insurance policy
      schema:
        $ref: '#/components/schemas/uuid'
    InsurancePolicyIds:
      name: insurancePolicyIds
      in: query
      required: false
      description: >-
        A common-separated list of insurance policy identifiers. Used to retrieve all insurance policies authorized by
        the User.
      schema:
        type: string
      explode: false
    IsCaapConsentOperation:
      name: o3-is-caap-consent-operation
      in: header
      required: false
      description: |-
        Flag to indicate that query originates from CAAP and is invoked to get available insurance policies

        LFIs must return all eligible policies when value is `true` to facilitate User selection.
      schema:
        type: boolean
    QuoteId:
      name: QuoteId
      in: path
      required: true
      description: Unique identifier for a quote created by an LFI
      schema:
        $ref: '#/components/schemas/uuid'
    apiOperation:
      name: o3-api-operation
      in: header
      required: true
      description: The API operation carried out by the caller (e.g. GET, POST, PUT, DELETE, PATCH)
      schema:
        type: string
    apiUri:
      name: o3-api-uri
      in: header
      required: true
      description: The URL of the API being called by the caller
      schema:
        type: string
    callerClientId:
      name: o3-caller-client-id
      in: header
      required: true
      description: An identifier for the OIDC clientId calling the API
      schema:
        type: string
    callerInteractionId:
      name: o3-caller-interaction-id
      in: header
      required: false
      description: The interaction ID passed in by the caller, if any
      schema:
        type: string
    callerOrgId:
      name: o3-caller-org-id
      in: header
      required: true
      description: An identifier for the organization calling the API
      schema:
        type: string
    callerSoftwareStatementId:
      name: o3-caller-software-statement-id
      in: header
      required: true
      description: An identifier for the software statement calling the API
      schema:
        type: string
    consentId:
      name: o3-consent-id
      in: header
      required: true
      description: The consentId for which this call is being made
      schema:
        type: string
    ozoneInteractionId:
      name: o3-ozone-interaction-id
      in: header
      required: true
      description: >-
        An interaction ID generated by Ozone if the caller did not send in one. If the callerInteractionId is specified,
        this takes the same value.
      schema:
        type: string
    page:
      name: page
      in: query
      required: true
      description: Page of results to request (standard pagination)
      schema:
        type: integer
        default: 1
    page-size:
      name: page-size
      in: query
      required: true
      description: Page size to request. Default is 100 to comply with the Operating Guidelines for the Open Finance Framework.
      schema:
        type: integer
        default: 100
    providerId:
      name: o3-provider-id
      in: header
      required: true
      description: Identifier for the financial institution that the request is targeted to
      schema:
        type: string
    psuIdentifier:
      name: o3-psu-identifier
      in: header
      required: true
      description: A Base64 encoded representation of the psuIdentifier JSON object.
      schema:
        type: string
  schemas:
    AEActiveCurrencyAmount:
      type: object
      required:
        - Currency
        - Amount
      properties:
        Currency:
          $ref: '#/components/schemas/AEActiveOrHistoricCurrencyCode'
        Amount:
          $ref: '#/components/schemas/AEActiveOrHistoricAmount'
      description: The Currency and Amount relating to the Payment, Refund or Request to Pay
    AEActiveOrHistoricAmount:
      type: string
      pattern: ^\d{1,16}\.\d{2}$
      description: >-
        A number of monetary units specified in an active currency where the unit of currency is explicit and compliant
        with ISO 4217.
      example: '100.00'
    AEActiveOrHistoricCurrencyCode:
      type: string
      pattern: ^[A-Z]{3,3}$
      description: >-
        A 3 character alphabetic code allocated to a currency under an international currency identification scheme, as
        described in the latest edition of the international standard ISO 4217 'Codes for the representation of
        currencies and funds'.
      example: AED
    AECreateEmploymentInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AEEmploymentInsuranceQuoteRequestProperties'
    AECreateHealthInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AEHealthInsuranceQuoteRequestProperties'
    AECreateHomeInsuranceQuoteRequestBody1:
      type: object
      required:
        - Data
      properties:
        Data:
          $ref: '#/components/schemas/AEHomeInsuranceQuoteRequestProperties'
    AECreateInsurancePolicyLinks1:
      type: object
      properties:
        CreateInsurancePolicyRedirectUrl:
          type: string
          format: uri
          description: >-
            A redirect URL provided by the LFI to complete creating the insurance policy. The TPP must redirect the User
            to this URL.

            The URL is optional as the LFI may have all required information through party data to complete account
            creation.
    AECreateLifeInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AELifeInsuranceQuoteRequestProperties'
    AECreateMotorInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AEMotorInsuranceQuoteRequestProperties'
    AECreateRentersInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AERentersInsuranceQuoteRequestProperties'
    AECreateTravelInsuranceQuoteRequestBody1:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AETravelInsuranceQuoteRequestProperties'
    AECustomErrorCode:
      type: string
      pattern: ^[A-Za-z]+\.[A-Za-z0-9]+$
    AECustomerPrimaryLanguage:
      type: string
      enum:
        - English
        - Arabic
        - Other
      description: Primary language spoken by the insurance policy customer
    AEDefaultErrorCode:
      type: string
      description: Custom error code without prefix, retained for compatibility with version 1.2.
    AEDurationYearsAndMonths:
      type: string
      pattern: ^P(\d+Y)?(\d+M)?$
      format: duration
      example: P2Y3M
    AEEmploymentInsuranceCoverProperties:
      type: object
      required:
        - SchemeCategory
        - Sector
        - PremiumFrequency
      properties:
        SchemeCategory:
          type: string
          enum:
            - CategoryA
            - CategoryB
          description: |-
            For Involuntary Loss of Employment Insurance (ILOE) confirmation of the customer's Salary Category.

            Categories are defined as follows:

            * Category A - Salary of AED16,000 or less
            * Category B - Salary Exceeding AED16,000
        Sector:
          type: string
          enum:
            - Private
            - FederalGovernment
          description: For Involuntary Loss of Employment Insurance (ILOE) confirmation of the customer's employment Sector
        PolicyTerm:
          allOf:
            - $ref: '#/components/schemas/AEDurationYearsAndMonths'
          description: The insurance policy term in years and months, using ISO 8601 compatible duration format
        PremiumFrequency:
          type: string
          enum:
            - Annually
            - OneTime
            - Monthly
            - Quarterly
            - BiAnnual
            - Limited
            - Other
          description: The payment frequency the calculated Premium has been based on.
    AEEmploymentInsurancePolicyProperties1:
      type: object
      required:
        - InsurancePolicyId
      properties:
        InsurancePolicyId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: Unique identifier for a given insurance policy
        Customer:
          type: object
          properties:
            Salutation:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceSalutation'
              description: The salutation of the customer
            FirstName:
              type: string
              minLength: 1
              maxLength: 70
              description: First Name of the individual.
            MiddleName:
              type: string
              minLength: 1
              maxLength: 70
              description: Middle Name of the individual.
            LastName:
              type: string
              minLength: 1
              maxLength: 70
              description: Last Name (Surname) of the individual.
            Gender:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceGender'
              description: The gender of the customer
            DateOfBirth:
              type: string
              format: date
              description: Date of birth of the individual.
            MaritalStatus:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceMaritalStatus'
              description: The marital status of the individual.
            ResidentialLocation:
              type: string
              description: Residential Location of the individual.
            LandlineNumber:
              allOf:
                - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
              pattern: ^\+?[1-9]\d{1,14}$
              description: The landline telephone number of the individual.
            Nationality:
              type: string
              pattern: ^[A-Z]{3}$
              description: The nationality of the individual based on the ISO 3166-1 alpha-3 codes
            PrimaryLanguage:
              allOf:
                - $ref: '#/components/schemas/AECustomerPrimaryLanguage'
              description: Primary language spoken by the insurance policy customer
            MobileNumber:
              allOf:
                - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
              description: The mobile telephone number of the individual.
            EmailAddress:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceEmailAddressType'
              description: Email address of the individual.
            Address:
              type: array
              items:
                type: object
                properties:
                  AddressType:
                    type: string
                    enum:
                      - Billing
                      - Business
                      - Correspondence
                      - DeliveryTo
                      - MailTo
                      - POBox
                      - Postal
                      - Permanent
                      - Residential
                      - Statement
                      - Other
                    description: The type of address.
                  AddressLine:
                    type: array
                    items:
                      $ref: '#/components/schemas/AEInsuranceAddressLine'
                    minItems: 1
                    maxItems: 7
                    description: >-
                      Information that locates and identifies a specific address for a transaction entry, that is
                      presented in free format text.


                      This value should be used where the address is provided or stored as a single string.
                  BuildingNumber:
                    type: string
                    minLength: 1
                    maxLength: 16
                    description: The unit, apartment, or villa number within a building or community
                  BuildingName:
                    type: string
                    minLength: 1
                    maxLength: 140
                    description: Name of the building or house.
                  Floor:
                    type: string
                    minLength: 1
                    maxLength: 70
                    description: Floor or storey within a building.
                  StreetName:
                    type: string
                    minLength: 1
                    maxLength: 140
                    description: The name of the street or road where the property is located
                  DistrictName:
                    type: string
                    minLength: 1
                    maxLength: 140
                    description: The district, community, or neighbourhood where the property is located
                  PostBox:
                    type: string
                    minLength: 1
                    maxLength: 16
                    description: The P.O. Box number assigned to the recipient for mail delivery
                  TownName:
                    type: string
                    minLength: 1
                    maxLength: 140
                    description: Name of a built-up area, such as a town or city
                  CountrySubDivision:
                    allOf:
                      - $ref: '#/components/schemas/AEInsuranceEmirate'
                    description: >-
                      Country subdivision, such as state or province. This is the Emirate where the address is
                      registered.
                  Country:
                    allOf:
                      - $ref: '#/components/schemas/AEInsuranceCountryCode'
                    description: The country associated with the address, represented using the ISO 3166-1 alpha-2 country code.
                required:
                  - AddressLine
                  - Country
              minItems: 1
              description: Customer's address details
            Employment:
              type: object
              properties:
                Profession:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: The individuals profession.
                ProfessionDescription:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: A description of the individual's Profession
                JobTitle:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Individual's job title
                Designation:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: An individual's professional qualifications, special licenses and certifications
                NatureOfEmployerBusiness:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: Nature of employer business
                EmployerName:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Employer name.
                EmployerAddress:
                  allOf:
                    - $ref: '#/components/schemas/AEInsuranceAddressProperties'
                  description: The address details of the individual's employer
                EmploymentStatus:
                  $ref: '#/components/schemas/AEInsuranceEmploymentStatus'
                StartDate:
                  type: string
                  format: date
                  description: Individual's employment start date
                SourceOfIncome:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Source of the individual's income as a free form description
                MonthlyIncomeAmount:
                  allOf:
                    - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                  description: Monthly income amount and currency
                AnnualIncomeAmount:
                  allOf:
                    - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                  description: Annual income amount and currency
                AdditionalCompensation:
                  type: array
                  items:
                    type: object
                    properties:
                      Description:
                        type: string
                        description: Free form description of the additional compensation
                      CompensationAmount:
                        allOf:
                          - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                        description: The amount of the additional compensation
                    required:
                      - Description
                      - CompensationAmount
                  minItems: 1
                  description: Provided when the individual has additional income.
                SalaryBand:
                  type: string
                  enum:
                    - NoSalary
                    - BelowAED000PM
                    - AED4000ToAED12000PM
                    - AED12001AndAbove
              required:
                - MonthlyIncomeAmount
              minProperties: 1
              description: >-
                Employment information for the policyholder. Requires `ReadCustomerDetail` permission to be granted by
                the User.
          required:
            - FirstName
            - LastName
            - Gender
            - DateOfBirth
            - Nationality
            - MobileNumber
            - EmailAddress
          description: >-
            Information about the customer. Requires `ReadCustomerBasic` permission to be granted by the User, except
            for `Employment` which requires `ReadCustomerDetail`.
        Identity:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceDataSharingIdentificationProperties'
          description: >-
            Identity information for the policyholder. Requires `ReadCustomerDetail` permission to be granted by the
            User.
        Product:
          type: object
          properties:
            Policy:
              type: object
              properties:
                SchemeCategory:
                  type: string
                  enum:
                    - CategoryA
                    - CategoryB
                  description: |-
                    For Involuntary Loss of Employment Insurance (ILOE) confirmation of the customer's Salary Category.

                    Categories are defined as follows:

                    * Category A - Salary of AED16,000 or less
                    * Category B - Salary Exceeding AED16,000
                Sector:
                  type: string
                  enum:
                    - Private
                    - FederalGovernment
                  description: For Involuntary Loss of Employment Insurance (ILOE) confirmation of the customer's employment Sector
                PolicyTerm:
                  allOf:
                    - $ref: '#/components/schemas/AEDurationYearsAndMonths'
                  description: The insurance policy term in years and months, using ISO 8601 compatible duration format
                PremiumFrequency:
                  type: string
                  enum:
                    - Annually
                    - OneTime
                    - Monthly
                    - Quarterly
                    - BiAnnual
                    - Limited
                    - Other
                  description: The payment frequency the calculated Premium has been based on.
                CoverStartDate:
                  type: string
                  format: date
                  description: The date on which cover starts.
                CoverEndDate:
                  type: string
                  description: The date on which cover ends.
                PolicyPurchaseChannelType:
                  type: string
                  enum:
                    - Direct
                    - Agent
                    - Broker
                    - Bank
                    - InvFinInst
                    - TPA
                    - OnlineInsideUAE
                    - OnlineOutsideUAE
                    - Aggregation
                    - Outside
                    - Other
                  description: Sales channel of policy.
              required:
                - SchemeCategory
                - Sector
                - PremiumFrequency
                - PolicyPurchaseChannelType
          required:
            - Policy
          description: Details of the insurance product. Requires `ReadInsuranceProduct` permission to be granted by the User.
        Claims:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceDataSharingClaimsWithLossCauseProperties'
          description: >-
            Details of claims made against the insurance policy. Requires the `ReadCustomerClaims` permission to be
            granted by the User.
        Premium:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceDataSharingPremiumProperties'
          description: >-
            Details of the insurance policy premium. Requires the `ReadInsurancePremium` permission to be granted by the
            User.
    AEEmploymentInsuranceQuoteRequestProperties:
      type: object
      required:
        - QuoteReference
        - Cover
        - Customer
        - Identity
        - Employment
      properties:
        CustomerId:
          type: string
          description: >-
            Identifier that uniquely and consistently identifies the insurance policy customer, where the applicant is
            an existing customer.
        QuoteReference:
          $ref: '#/components/schemas/AEInsuranceQuoteReferenceType'
        Cover:
          $ref: '#/components/schemas/AEEmploymentInsuranceCoverProperties'
        Customer:
          $ref: '#/components/schemas/AEInsuranceCustomerQuoteProperties'
        Identity:
          type: object
          properties:
            EmiratesIdNumber:
              type: string
              pattern: ^784-?[0-9]{4}-?[0-9]{7}-?[0-9]{1}$
              description: Emirates identification number
            EmiratesIdExpiryDate:
              type: string
              format: date
              description: Emirates ID expiry date
            Passport:
              type: object
              properties:
                PassportNumber:
                  type: string
                  pattern: ^[A-Z0-9]+$
                  description: Passport number
                IssuingCountry:
                  type: string
                  pattern: ^[A-Z]{3,3}$
                  description: The country the passport is issued by.
                NameOnPassport:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: The applicant, policyholder or insured person name as detailed on their passport
                IssueDate:
                  type: string
                  format: date
                  description: The passport issue date
                ExpiryDate:
                  type: string
                  format: date
                  description: The passport expiry date
              description: Details of passport held by insured person, omitted if not required or information not held.
              minProperties: 1
            Visa:
              type: object
              properties:
                VisaNumber:
                  type: string
                  description: Visa number
                IssueDate:
                  type: string
                  format: date
                  description: Date the Visa was issued
                ExpiryDate:
                  type: string
                  format: date
                  description: Date the Visa will expire
                IssuingEmirate:
                  allOf:
                    - $ref: '#/components/schemas/AEInsuranceEmirate'
                  description: The Emirates that issued the Visa
              minProperties: 1
              description: Details of visa issued to insured person, omitted if not required or information not held.
          required:
            - EmiratesIdNumber
            - EmiratesIdExpiryDate
        Employment:
          type: object
          properties:
            Profession:
              type: string
              minLength: 1
              maxLength: 70
              description: The individuals profession.
            ProfessionDescription:
              type: string
              description: A description of the individual's Profession
            JobTitle:
              type: string
              description: Individual's job title
            Designation:
              type: string
              description: An individual's professional qualifications, special licenses and certifications
            NatureOfEmployerBusiness:
              type: string
              description: Nature of employer business
            EmployerName:
              type: string
              minLength: 1
              maxLength: 70
              description: Employer name.
            EmployerAddress:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceAddressProperties'
              description: The address details of the individual's employer
            EmploymentStatus:
              $ref: '#/components/schemas/AEInsuranceEmploymentStatus'
            StartDate:
              type: string
              format: date
              description: Individual's employment start date
            SourceOfIncome:
              type: string
              description: Source of the individual's income as a free form description
            MonthlyIncomeAmount:
              allOf:
                - $ref: '#/components/schemas/AEActiveCurrencyAmount'
              description: Monthly income amount and currency
            AnnualIncomeAmount:
              allOf:
                - $ref: '#/components/schemas/AEActiveCurrencyAmount'
              description: Annual income amount and currency
            AdditionalCompensation:
              type: array
              items:
                type: object
                properties:
                  Description:
                    type: string
                    description: Free form description of the additional compensation
                  CompensationAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: The amount of the additional compensation
                required:
                  - Description
                  - CompensationAmount
              minItems: 1
              description: Provided when the individual has additional income.
          required:
            - EmployerName
            - EmploymentStatus
            - MonthlyIncomeAmount
          description: Details of the employment to be insured.
    AEEngineProperties:
      anyOf:
        - type: object
          properties:
            EngineType:
              type: string
              enum:
                - Electric
              description: Engine type for fully-electric vehicles.
            BatteryCapacity:
              type: string
              description: The capacity of the battery.
            MotorPower:
              type: string
              description: The power of the vehicle motor.
          required:
            - EngineType
        - type: object
          properties:
            EngineType:
              type: string
              enum:
                - Hybrid
              description: Engine type for hybrid vehicles.
            BatteryCapacity:
              type: string
              description: The capacity of the battery.
            MotorPower:
              type: string
              description: The power of the vehicle motor.
            EngineCapacity:
              type: string
              description: The engine displacement volume in cubic centimetres (cc).
            CylinderCapacity:
              type: string
              description: The number of cylinders
          required:
            - EngineType
            - EngineCapacity
            - CylinderCapacity
        - type: object
          properties:
            EngineType:
              type: string
              enum:
                - InternalCombustionEngine
              description: Engine type for vehicles with an internal combustion engine.
            EngineCapacity:
              type: string
              description: The engine displacement volume in cubic centimetres (cc).
            CylinderCapacity:
              type: string
              description: The number of cylinders
          required:
            - EngineType
            - EngineCapacity
            - CylinderCapacity
      description: Details of the engine type for the vehicle
    AEError400Codes:
      type: string
      enum:
        - Consent.Invalid
        - Consent.BusinessRuleViolation
        - Consent.FailsControlParameters
        - Consent.InvalidUserIdentifier
        - JWS.InvalidSignature
        - JWS.Malformed
        - JWS.InvalidClaim
        - JWS.InvalidHeader
        - JWS.InvalidPayload
        - JWE.DecryptionError
        - JWE.InvalidHeader
        - GenericRecoverableError
        - GenericError
        - Event.UnexpectedEvent
        - Body.InvalidFormat
        - Resource.InvalidFormat
    AEError403Codes:
      type: string
      enum:
        - AccessToken.InvalidScope
        - Consent.TransientAccountAccessFailure
        - Consent.AccountTemporarilyBlocked
        - Consent.PermanentAccountAccessFailure
        - GenericRecoverableError
        - GenericError
    AEErrorGenericCodes:
      type: string
      enum:
        - GenericRecoverableError
        - GenericError
    AEHealthInsuranceDataSharingInsuredParty:
      type: object
      required:
        - RelationshipToPolicyholder
        - FirstName
        - LastName
        - Gender
        - DateOfBirth
        - Nationality
        - Identity
      properties:
        RelationshipToPolicyholder:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceRelationshipToInsuredPartyCodes'
          description: The relationship to the policyholder.
        Salutation:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceSalutation'
          description: The salutation of the customer
        FirstName:
          type: string
          minLength: 1
          maxLength: 70
          description: First Name of the individual.
        MiddleName:
          type: string
          minLength: 1
          maxLength: 70
          description: Middle Name of the individual.
        LastName:
          type: string
          minLength: 1
          maxLength: 70
          description: Last Name (Surname) of the individual.
        Gender:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceGender'
          description: The gender of the customer
        DateOfBirth:
          type: string
          format: date
          description: Date of birth of the individual.
        MaritalStatus:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceMaritalStatus'
          description: The marital status of the individual.
        ResidentialLocation:
          type: string
          description: Residential Location of the individual.
        LandlineNumber:
          allOf:
            - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
          pattern: ^\+?[1-9]\d{1,14}$
          description: The landline telephone number of the individual.
        Nationality:
          type: string
          pattern: ^[A-Z]{3}$
          description: The nationality of the individual based on the ISO 3166-1 alpha-3 codes
        PrimaryLanguage:
          allOf:
            - $ref: '#/components/schemas/AECustomerPrimaryLanguage'
          description: Primary language spoken by the insurance policy customer
        MobileNumber:
          allOf:
            - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
          description: The mobile telephone number of the individual.
        EmailAddress:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceEmailAddressType'
          description: Email address of the individual.
        Address:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceAddress'
          minItems: 1
          description: Insured person address details.
        Identity:
          allOf:
            - $ref: '#/components/schemas/AEHealthInsuranceQuoteIdentity'
          description: Insured person identity details.
        Employment:
          type: object
          properties:
            Profession:
              type: string
              minLength: 1
              maxLength: 70
              description: The individuals profession.
            EmployerName:
              type: string
              minLength: 1
              maxLength: 70
              description: Employer name.
            SalaryBand:
              allOf:
                - $ref: '#/components/schemas/AEHealthInsuranceSalaryBandCode'
              description: Monthly salary band of the individual's income
            EmploymentLocation:
              type: string
              description: Location of the individual's employer
          minProperties: 1
          description: Insured person employment details. Omitted if no details are held.
    AEHealthInsuranceMedicalHistoryProperties:
      type: object
      required:
        - InsuredName
        - Height
        - Weight
        - Hospital
        - Medication
        - Consult
        - Chronic
        - Cancer
        - Other
      properties:
        InsuredName:
          type: string
          minLength: 1
          maxLength: 140
          description: The person who the medical responses relate to
        Height:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceHeightType'
          description: The policyholder or applicant height in centimeters at the time of application.
        Weight:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceWeightType'
          description: The policyholder or applicant weight in kilograms at the time of application.
        Hospital:
          type: boolean
          description: >-
            Confirmation whether the Insured Person has been admitted to a hospital or other similar medical facility in
            the last five years.
        Medication:
          type: boolean
          description: >-
            Confirmation whether the Insured Person has been prescribed medication or treatment for more than seven days
            in the last two years.
        Consult:
          type: boolean
          description: >-
            Confirmation whether the Insured Person has a known or foreseeable need to consult with a medical
            practitioner or health care professional, require prescribed medication, or to be admitted to a hospital or
            medical facility.
        Chronic:
          type: boolean
          description: >-
            Confirmation whether the Insured Person has ever been diagnosed with or suffered from a chronic or
            pre-existing condition.
        Cancer:
          type: boolean
          description: >-
            Confirmation whether the Insured Person has ever been diagnosed with or treated for cancer, lump, cyst, or
            tumour.
        Other:
          type: boolean
          description: Confirmation whether the Insured Person has any other medical conditions
        FemaleOnly:
          type: object
          properties:
            Pregnant:
              type: boolean
              description: Confirmation whether the Insured Person is currently pregnant.
            Caesarean:
              type: string
              description: >-
                If the applicant or insured person is pregnant confirm if the current or any previous delivery was via
                caesarean section
            Complications:
              type: string
              description: If the applicant or insured person is pregnant confirm if there any known pregnancy complications
            Future:
              type: string
              description: >-
                If the applicant or insured person is not pregnant confirm if the Insured Person is currently trying to
                get pregnant or undergoing any form of fertility treatment
            Period:
              type: string
              format: date
              description: >-
                If the applicant or insured person is not pregnant confirm to the Pregnancy question to confirm the date
                of last menstrual period
          required:
            - Pregnant
          description: Required when the Insured Person is a female
        ConditionDetails:
          type: array
          items:
            type: object
            properties:
              QuestionName:
                type: string
                minLength: 1
                maxLength: 34
                description: >-
                  The Question property name of the 'Yes' response. For example, if `Hospital` is true this value should
                  be set to `Hospital`.
              QuestionDescription:
                type: string
                description: The medical question description asked to the Insured Person.
              ConditionDescription:
                type: string
                description: Condition description
              LastTreatmentDate:
                type: string
                format: date
                description: >-
                  Date of last treatment or symptoms. If the treatment or symptoms are ongoing the current date must be
                  populated.
              CurrentDiagnosis:
                type: string
                enum:
                  - NoSymptoms
                  - OngoingSymptoms
                  - OngoingHospitalization
                  - PendingHospitalization
                  - OngoingTreatment
                  - PendingTreatment
                description: The current diagnosis of the declared condition.
              Treated:
                type: string
                enum:
                  - Outpatient
                  - Hospitalized
                  - Both
                  - NotApplicable
                description: Whether the condition relates to hospital treatment
              OperationDate:
                type: string
                format: date
                description: If an operation was involved, date of the operation
              Symptoms:
                allOf:
                  - $ref: '#/components/schemas/AEHealthInsuranceSymptomCodes'
                description: How often do the symptoms occur or how can the illness be described as
              AgeAtTimeOfDiagnosis:
                type: integer
                description: Age at time of diagnosis
            required:
              - QuestionName
              - QuestionDescription
              - ConditionDescription
              - LastTreatmentDate
              - CurrentDiagnosis
              - Treated
              - Symptoms
              - AgeAtTimeOfDiagnosis
          description: >-
            Details of the conditions declared by the insured person. This property can be omitted if all conditions are
            stated as being false so that the insured person has zero conditions that need to be declared.
    AEHealthInsurancePolicyProperties1:
      type: object
      required:
        - InsurancePolicyId
      properties:
        InsurancePolicyId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: Unique identifier for a given insurance policy
        Customer:
          type: object
          properties:
            Salutation:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceSalutation'
              description: The salutation of the customer
            FirstName:
              type: string
              minLength: 1
              maxLength: 70
              description: First Name of the individual.
            MiddleName:
              type: string
              minLength: 1
              maxLength: 70
              description: Middle Name of the individual.
            LastName:
              type: string
              minLength: 1
              maxLength: 70
              description: Last Name (Surname) of the individual.
            Gender:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceGender'
              description: The gender of the customer
            DateOfBirth:
              type: string
              format: date
              description: Date of birth of the individual.
            MaritalStatus:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceMaritalStatus'
              description: The marital status of the individual.
            ResidentialLocation:
              type: string
              description: Residential Location of the individual.
            LandlineNumber:
              allOf:
                - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
              pattern: ^\+?[1-9]\d{1,14}$
              description: The landline telephone number of the individual.
            Nationality:
              type: string
              pattern: ^[A-Z]{3}$
              description: The nationality of the individual based on the ISO 3166-1 alpha-3 codes
            PrimaryLanguage:
              allOf:
                - $ref: '#/components/schemas/AECustomerPrimaryLanguage'
              description: Primary language spoken by the insurance policy customer
            MobileNumber:
              allOf:
                - $ref: '#/components/schemas/AEInsurancePhoneNumberType'
              description: The mobile telephone number of the individual.
            EmailAddress:
              allOf:
                - $ref: '#/components/schemas/AEInsuranceEmailAddressType'
              description: Email address of the individual.
            Address:
              type: array
              items:
                $ref: '#/components/schemas/AEInsuranceAddress'
              minItems: 1
              description: Customer's address details
            Employment:
              type: object
              properties:
                Profession:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: The individuals profession.
                ProfessionDescription:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: A description of the individual's Profession
                JobTitle:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Individual's job title
                Designation:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: An individual's professional qualifications, special licenses and certifications
                NatureOfEmployerBusiness:
                  type: string
                  minLength: 1
                  maxLength: 140
                  description: Nature of employer business
                EmployerName:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Employer name.
                EmployerAddress:
                  allOf:
                    - $ref: '#/components/schemas/AEInsuranceAddressProperties'
                  description: The address details of the individual's employer
                EmploymentStatus:
                  $ref: '#/components/schemas/AEInsuranceEmploymentStatus'
                StartDate:
                  type: string
                  format: date
                  description: Individual's employment start date
                SourceOfIncome:
                  type: string
                  minLength: 1
                  maxLength: 70
                  description: Source of the individual's income as a free form description
                MonthlyIncomeAmount:
                  allOf:
                    - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                  description: Monthly income amount and currency
                AnnualIncomeAmount:
                  allOf:
                    - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                  description: Annual income amount and currency
                AdditionalCompensation:
                  type: array
                  items:
                    type: object
                    properties:
                      Description:
                        type: string
                        description: Free form description of the additional compensation
                      CompensationAmount:
                        allOf:
                          - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                        description: The amount of the additional compensation
                    required:
                      - Description
                      - CompensationAmount
                  minItems: 1
                  description: Provided when the individual has additional income.
                SalaryBand:
                  type: string
                  enum:
                    - NoSalary
                    - BelowAED000PM
                    - AED4000ToAED12000PM
                    - AED12001AndAbove
              required:
                - MonthlyIncomeAmount
              minProperties: 1
              description: >-
                Employment information for the policyholder. Requires `ReadCustomerDetail` permission to be granted by
                the User.
          required:
            - FirstName
            - LastName
            - Gender
            - DateOfBirth
            - Nationality
            - MobileNumber
            - EmailAddress
            - Address
          description: >-
            Information about the customer. Requires `ReadCustomerBasic` permission to be granted by the User, except
            for `Employment` which requires `ReadCustomerDetail`.
        Identity:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceDataSharingIdentificationProperties'
          description: >-
            Identity information for the policyholder. Requires `ReadCustomerDetail` permission to be granted by the
            User.
        Product:
          allOf:
            - $ref: '#/components/schemas/AEHealthInsuranceProductData'
          description: >-
            Details of the insurance policy product. Requires the `ReadInsuranceProduct` permission to be granted by the
            User.
        Claims:
          type: object
          properties:
            Summary:
              type: array
              items:
                $ref: '#/components/schemas/AEInsuranceDataSharingClaimsSummaryProperties'
              minItems: 1
              description: >-
                Summary of previous claims. `NumberOfPreviousMonths` value must appear only once.


                If no claims have been made then an array element with `NumberOfPreviousMonths` set to zero must be
                provided, and all claim amounts must be set to zero, to provide a positive assertion that no claims have
                been made. Currency must be set to AED for this case.
            ClaimsHistory:
              type: array
              items:
                type: object
                properties:
                  ClaimUniqueID:
                    type: string
                    minLength: 1
                    maxLength: 128
                    description: Unique reference that identifies the claim
                  ClaimDate:
                    type: string
                    format: date
                    description: The date on which the claim was made.
                  TotalGrossClaimAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: >-
                      As per CBUAE scheme, total gross claim amount including Direct + Third party + Coinsurance /
                      deductible + Loss Adjusters + VAT.
                  ClaimPayments:
                    type: array
                    items:
                      type: object
                      properties:
                        Currency:
                          $ref: '#/components/schemas/AEActiveOrHistoricCurrencyCode'
                        Amount:
                          $ref: '#/components/schemas/AEActiveOrHistoricAmount'
                        PaymentDate:
                          type: string
                          format: date
                          description: The date on which the claim payment was made.
                      required:
                        - Currency
                        - Amount
                        - PaymentDate
                    minItems: 1
                    description: The amounts paid with amount, currency, and date.
                  DeductibleGrossClaimAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: Deductible and co-insurance amount paid by customer.
                  PolicyClaimedBenefits:
                    type: array
                    items:
                      type: object
                      properties:
                        ClaimedBenefitType:
                          type: string
                        ClaimedBenefitDescription:
                          type: string
                      required:
                        - ClaimedBenefitType
                        - ClaimedBenefitDescription
                    description: All the claimed policy benefits.
                  ClaimApprovalDate:
                    type: string
                    format: date
                    description: Date claim was approved.
                  ClaimLastUpdateDate:
                    type: string
                    format: date
                    description: Last update date of the claim.
                  DirectGrossClaimAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: Amount of the claim paid directly.
                  ThirdPartyGrossClaimAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: Amount of claim to be paid via third party insurance company.
                  ThirdPartyRecoveryCompany:
                    type: string
                    description: Name of recovery third party insurance company.
                  ThirdPartyRecoveryStatus:
                    type: string
                    enum:
                      - Approved
                      - Reopened
                      - RecoveryOpened
                      - Paid
                      - RecoveryReopenedAndClaimClosed
                      - Rejected
                      - InProgress
                    description: Status of recovery.
                  LossAdjusterGrossClaimAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: Loss Adjusters fees on above claims.
                  OutstandingPayAmount:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: Claim payment amount outstanding.
                  Status:
                    type: string
                    enum:
                      - Approved
                      - Reopened
                      - RecoveryOpened
                      - RecoveryReopenedAndClaimClosed
                      - Rejected
                    description: The status of the claim
                  FirstEncounterDate:
                    type: string
                    format: date
                    description: First date of the encounter.
                  FirstServiceDate:
                    type: string
                    format: date
                    description: First date of service.
                  LastServiceDate:
                    type: string
                    format: date
                    description: Last date of service.
                required:
                  - ClaimUniqueID
                  - ClaimDate
                  - TotalGrossClaimAmount
                  - PolicyClaimedBenefits
                  - ClaimLastUpdateDate
                  - Status
                  - FirstEncounterDate
                  - FirstServiceDate
                  - LastServiceDate
              minItems: 1
              description: Claims history. Only required if claims have been made against the policy.
          required:
            - Summary
          description: >-
            Details of claims made against the insurance policy. Requires the `ReadCustomerClaims` permission to be
            granted by the User.
        Premium:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceDataSharingPremiumProperties'
          description: >-
            Details of the insurance policy premium. Requires the `ReadInsurancePremium` permission to be granted by the
            User.
    AEHealthInsurancePremium:
      type: object
      required:
        - PremiumAmountExcludingVAT
        - VATAmount
        - TotalPremiumAmount
        - PaymentFrequency
      properties:
        Status:
          type: string
          enum:
            - Initial
            - StartingFrom
            - Final
          description: Confirmation whether the premium quoted is an initial premium, starting from, or final.
        TotalDiscountAmount:
          allOf:
            - $ref: '#/components/schemas/AEActiveCurrencyAmount'
          description: The total discount amount applied to the final premium amount
        DiscountApplied:
          type: array
          items:
            $ref: '#/components/schemas/AEInsurancePremiumDiscountApplied'
          minItems: 1
          description: Details of the discounts applied
        PremiumAmountExcludingVAT:
          allOf:
            - $ref: '#/components/schemas/AEActiveCurrencyAmount'
          description: The Premium Amount excluding any VAT amount
        VATAmount:
          allOf:
            - $ref: '#/components/schemas/AEActiveCurrencyAmount'
          description: The Premium VAT amount.
        VATPercentage:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceVATPercentage'
          description: The VAT percentage rate charged to the premium.
        TotalPremiumAmount:
          allOf:
            - $ref: '#/components/schemas/AEActiveCurrencyAmount'
          description: The total Premium amount including VAT
        PaymentFrequency:
          allOf:
            - $ref: '#/components/schemas/AEInsurancePaymentFrequency'
          description: The payment frequency the calculated Premium has been based on.
        InstallmentOptions:
          type: array
          items:
            $ref: '#/components/schemas/AEInsurancePaymentFrequency'
          minItems: 1
          description: The possible Premium instalment frequency options available to the customer
        PremiumAdditionalFees:
          allOf:
            - $ref: '#/components/schemas/AEHealthInsurancePremiumAdditionalFees'
          minProperties: 1
          description: Objects confirming additional fees and charges that have been included in the premium quote.
    AEHealthInsurancePremiumAdditionalFees:
      type: object
      properties:
        BasmahProgramFee:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceBasmahProgramFee'
          description: >-
            Object confirming the Basmah Program Fee that is applicable to the insurance policy and included in the
            premium quote
        HCVProgramFee:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceHCVProgramFee'
          description: >-
            Object confirming the Hepatitis C Virus (HCV) Patient Support Program Fee that is applicable to the
            insurance policy and included in the premium quote
        ICPProgramFee:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceICPProgramFee'
          description: >-
            Object confirming the Integrated Care Plans (ICPs) charges that is applicable to the insurance policy and
            included in the premium quote
    AEHealthInsuranceProductData:
      type: object
      required:
        - Policy
      properties:
        Policy:
          type: object
          properties:
            CoverSubjects:
              type: string
              enum:
                - Self
                - SelfAndSpouse
                - Spouse
                - SelfAndFamily
                - Dependents
                - Other
              description: Confirmation whether the insurance cover is for the customer (self) or their dependents
            PolicyStartDate:
              type: string
              format: date
              description: Policy start date
            IsPolicyholderInsured:
              type: boolean
              description: >-
                When true confirmation that the Policyholder (customer) is also the Insured Person or when false
                confirmation that the Policyholder and the Insured Person(s) are different
            TypeOfPolicy:
              type: string
              enum:
                - HealthInsuranceIndividual
                - PersonalAccidentInsurance
              description: The type of health insurance plan selected
            PolicyTerm:
              allOf:
                - $ref: '#/components/schemas/AEDurationYearsAndMonths'
              description: The duration of the health insurance policy, measured in months or years
            CareNetwork:
              type: string
              minLength: 1
              maxLength: 140
              description: The network of healthcare providers, hospitals, and clinics covered under the policy
            RegionsCoverage:
              type: string
              minLength: 1
              maxLength: 140
              description: >-
                The geographical regions where the policyholder is covered for medical treatment (e.g., local, GCC,
                worldwide excluding the U.S., worldwide).
            Takaful:
              type: boolean
              description: Indicates whether the policy is Takaful.
            ProductName:
              type: string
              description: Business name of the policy product as provided externally to the customer.
            PolicyEndDate:
              type: string
              format: date
              description: The date when the coverage will or has ended.
            PolicyExcess:
              allOf:
                - $ref: '#/components/schemas/AEActiveCurrencyAmount'
              description: When applicable, the amount that would be deductible from any claim.
            PolicyCoverAndBenefits:
              type: array
              items:
                type: object
                properties:
                  CoverType:
                    type: string
                    description: Type of cover as defined in company systems.
                  Description:
                    type: string
                    description: Description of the cover / benefit.
                  Required:
                    type: boolean
                    description: >-
                      To confirm whether the cover or benefit is required as part of the base insurance policy or is
                      optional.
                  CoverLimit:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: When applicable, the benefit coverage limit that could be paid if a claim was made.
                  CoverInclusionsAndExclusions:
                    type: array
                    items:
                      type: object
                      properties:
                        InclusionAndExclusionDescription:
                          type: string
                          description: Description of the inclusion or exclusion.
                      required:
                        - InclusionAndExclusionDescription
                    minItems: 1
                    description: included inclusions and exclusions for cover type.
                  CoverExcess:
                    allOf:
                      - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                    description: When applicable, the amount that would be deductible from any claim.
                  CoverID:
                    type: string
                    description: Insurers internal unique ID for specific cover.
                required:
                  - CoverType
                  - Description
                  - Required
              minItems: 1
              description: Cover and benefits provided by the policy.
            PolicyPurchaseChannelType:
              type: string
              enum:
                - Direct
                - Agent
                - Broker
                - Bank
                - InvFinInst
                - TPA
                - OnlineInsideUAE
                - OnlineOutsideUAE
                - Aggregation
                - Outside
                - Other
              description: Sales channel of policy.
          required:
            - CoverSubjects
            - PolicyStartDate
            - IsPolicyholderInsured
            - PolicyTerm
            - Takaful
            - ProductName
            - PolicyCoverAndBenefits
            - PolicyPurchaseChannelType
          description: Details of the what the insurance policy covers.
        InsuredParties:
          type: array
          items:
            $ref: '#/components/schemas/AEHealthInsuranceDataSharingInsuredParty'
          minItems: 1
          description: |-
            The persons insured under the policy, if different to the policyholder. 
            If the policyholder is the only insured person this property can be omitted.
        Sponsor:
          type: array
          items:
            $ref: '#/components/schemas/AEHealthInsuranceSponsorProperties'
          minItems: 1
          description: >-
            Details of sponsor(s), where required by the policyholder or one-or-more insured persons. Omitted if not
            required or not available.
    AEHealthInsuranceQuoteCreateResponseProperties:
      type: object
      required:
        - QuoteStatus
        - QuoteId
        - QuoteReference
        - CreationDateTime
        - ServiceRating
      properties:
        QuoteStatus:
          anyOf:
            - type: string
              enum:
                - Pending
            - type: string
              enum:
                - Available
          description: The current status of the quote
        QuoteId:
          $ref: '#/components/schemas/AEInsuranceQuoteIdType'
        QuoteReference:
          $ref: '#/components/schemas/AEInsuranceQuoteReferenceType'
        CreationDateTime:
          type: string
          format: date-time
          description: The date and time at which the quote was created.
        ExpirationDateTime:
          type: string
          format: date-time
          description: >-
            The expiration date of the quote, after which it is no longer valid.  If no date is provided the quote will
            be valid for up to 30 days as per the Standards.
        PremiumTargetDateTime:
          type: string
          format: date-time
          description: >-
            The target date and time at which the insurer will generate a quote premium. Maximum allowed time is 24
            hours from quote resource creation.
        PlanName:
          type: string
          minLength: 1
          maxLength: 140
          description: The specific name of the insurance plan. If the quote status is `Pending` this data may not be available.
        LevelOfCover:
          type: string
          minLength: 1
          maxLength: 140
          description: The level of insurance Cover offered in the quote
        Commission:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceCommission'
          description: >-
            An object containing details of the commission amount that would be payable to the TPP if the User proceeded
            with the insurance application and purchased the policy based on the provided information
        PolicyCover:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceQuotePolicyCover'
          minItems: 1
          description: >-
            An array containing options for policy cover, which contain information about the cover and benefits
            included in the quoted policies.
        PolicyDocumentsUris:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceQuoteUri'
          minItems: 1
          description: >-
            A list of URLs linking to policy-related documents, such as terms and conditions, policy wording, or product
            disclosures
        AvailableAddOns:
          type: array
          items:
            type: object
            properties:
              CoverName:
                type: string
                minLength: 1
                maxLength: 70
                description: Name of the insurance cover add-on
              Description:
                type: string
                minLength: 1
                maxLength: 140
                description: Description of the insurance cover add-on
              Amount:
                allOf:
                  - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                description: Premium value of the insurance cover add-on
              CoverLimit:
                allOf:
                  - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                description: When applicable, the benefit coverage limit that could be paid if a claim was made.
              CoverInclusionsAndExclusions:
                type: string
                description: included inclusions and exclusions for cover type.
              PolicyExcess:
                allOf:
                  - $ref: '#/components/schemas/AEActiveCurrencyAmount'
                description: When applicable, the amount that would be deductible from any claim.
            required:
              - CoverName
              - Description
          minItems: 1
          description: An object containing details of optional add-ons available for the quoted policy
        RequiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceDocumentRequirement'
          minItems: 1
          description: >-
            A list of documents required that must be provided by the User to the LFI to proceed with the policy
            purchase
        DiscountOffers:
          type: array
          items:
            $ref: '#/components/schemas/AEInsurancePremiumDiscountOffers'
          minItems: 1
          description: An object containing details of any discounts or offers applied to the quote
        ServiceRating:
          allOf:
            - $ref: '#/components/schemas/AEInsuranceServiceRating'
          description: An object containing ratings or reviews of the insurer's service quality
        SpecialConditionsApplicable:
          type: array
          items:
            $ref: '#/components/schemas/AEInsuranceSpecialConditions'
          description: >-
            Provides special conditions or clauses applicable to the policy specified by the LFI, which must be
            displayed to the User if provided.
        Premium:
          allOf:
            - $ref: '#/components/schemas/AEHealthInsurancePremium'
          minProperties: 1
          description: An object containing details of the quoted insurance premium
    AEHealthInsuranceQuoteEmployment:
      type: object
