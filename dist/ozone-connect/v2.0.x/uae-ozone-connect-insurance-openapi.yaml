      tags:
        - Employment Insurance
    patch:
      operationId: EmploymentInsurancePatchQuoteByQuoteId_update
      summary: Accept an employment insurance quote
      description: |-
        Update the quote status to `Accepted` in readiness to send the quote data to 
        create a new insurance policy. The TPP must update the status to Accepted before
        retrieving any additional data through their Data Sharing permissions, to include
        in the new insurance policy request.
      parameters:
        - $ref: '#/components/parameters/providerId'
        - $ref: '#/components/parameters/callerOrgId'
        - $ref: '#/components/parameters/callerClientId'
        - $ref: '#/components/parameters/callerSoftwareStatementId'
        - $ref: '#/components/parameters/apiUri'
        - $ref: '#/components/parameters/apiOperation'
        - $ref: '#/components/parameters/callerInteractionId'
        - $ref: '#/components/parameters/ozoneInteractionId'
        - $ref: '#/components/parameters/QuoteId'
